<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日報">
<title>日報</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f0ea; min-height: 100vh; }

/* ヘッダー */
.header { background: #fff; border-bottom: 1px solid #ede8e2; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.header-inner { max-width: 540px; margin: 0 auto; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.logo { font-size: 16px; font-weight: 700; color: #2d2a26; white-space: nowrap; }
.tabs { display: flex; gap: 2px; background: #f5f0ea; border-radius: 10px; padding: 3px; }
.tab { padding: 6px 10px; border-radius: 7px; border: none; background: transparent; color: #888; font-size: 12px; cursor: pointer; font-weight: 500; font-family: inherit; white-space: nowrap; }
.tab.active { background: #e07b4f; color: #fff; font-weight: 700; }
.badge { display: inline-block; background: #fff; color: #e07b4f; border-radius: 10px; padding: 0 4px; font-size: 10px; font-weight: 700; margin-left: 2px; }
.body { max-width: 540px; margin: 0 auto; padding: 0 0 60px; }
.view { display: none; }
.view.active { display: block; }

/* 共通 */
.wrap { padding: 20px; }
.page-title { font-size: 18px; font-weight: 700; color: #2d2a26; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #aaa; margin-bottom: 20px; }
.field { margin-bottom: 18px; }
label.lbl { display: block; font-weight: 600; font-size: 14px; color: #2d2a26; margin-bottom: 8px; }
select, input[type=text], input[type=date], input[type=time], input[type=number], input[type=password], textarea {
  width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #e0d8d0;
  font-size: 15px; color: #2d2a26; background: #fff; outline: none; font-family: inherit;
  appearance: none; -webkit-appearance: none;
}
textarea { resize: vertical; }
.btn-primary { width: 100%; padding: 14px; background: #e07b4f; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-secondary { width: 100%; padding: 12px; background: #fff; color: #888; border: 1.5px solid #e0d8d0; border-radius: 12px; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px; }
.back-btn { background: none; border: none; color: #e07b4f; font-size: 14px; cursor: pointer; padding: 0 0 16px; font-weight: 600; font-family: inherit; display: block; }
.card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid #ede8e2; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.section-title { font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 10px; letter-spacing: 0.05em; }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
.empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }

/* フォーム入力 */
.date-label { font-size: 13px; color: #aaa; margin-bottom: 20px; }
.weather-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
.weather-btn { padding: 10px 4px; border-radius: 9px; font-size: 12px; cursor: pointer; border: 2px solid #e0d8d0; background: #f5f0ea; color: #555; font-family: inherit; }
.weather-btn.selected { background: #e07b4f; color: #fff; border-color: #e07b4f; font-weight: 700; }
.site-card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1.5px solid #e0d8d0; }
.site-top-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.site-input { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1.5px solid #e0d8d0; font-size: 14px; }
.remove-btn { background: none; border: none; color: #ccc; font-size: 20px; cursor: pointer; padding: 0 4px; }
.time-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
.time-field { display: flex; align-items: center; gap: 5px; flex: 1; }
.time-label { font-size: 12px; color: #888; white-space: nowrap; }
.time-input { flex: 1; padding: 8px; border-radius: 7px; border: 1.5px solid #e0d8d0; font-size: 13px; }
.time-sep { color: #ccc; font-size: 14px; }
.process-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 12px; }
.proc-btn { padding: 9px 4px; border-radius: 7px; font-size: 13px; cursor: pointer; text-align: center; border: 2px solid #e0d8d0; background: #fff; color: #666; font-family: inherit; }
.proc-btn.selected { background: #e07b4f; color: #fff; border-color: #e07b4f; font-weight: 700; }
.material-section { border-top: 1px solid #f0ebe5; padding-top: 10px; }
.material-title { font-size: 11px; font-weight: 600; color: #bbb; margin-bottom: 8px; }
.material-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.material-label { font-size: 13px; color: #666; width: 68px; flex-shrink: 0; }
.material-input { width: 80px !important; padding: 6px 8px !important; text-align: right; }
.material-unit { font-size: 13px; color: #aaa; }
.add-btn { background: none; border: 1.5px dashed #e07b4f; color: #e07b4f; border-radius: 9px; padding: 9px 16px; font-size: 13px; cursor: pointer; margin-top: 4px; font-family: inherit; }

/* 完了 */
.done-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
.done-icon { width: 72px; height: 72px; border-radius: 50%; background: #e07b4f; color: #fff; font-size: 36px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.done-title { font-size: 22px; font-weight: 700; color: #2d2a26; margin-bottom: 8px; }
.done-msg { font-size: 14px; color: #aaa; margin-bottom: 32px; }

/* 一覧 */
.search-box { position: relative; margin-bottom: 12px; }
.search-input { width: 100%; padding: 11px 36px 11px 40px; border-radius: 10px; border: 1.5px solid #e0d8d0; font-size: 14px; background: #fff; outline: none; font-family: inherit; -webkit-appearance: none; }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
.search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #ccc; font-size: 20px; cursor: pointer; padding: 0; display: none; font-family: inherit; }
.filter-row { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
.filter-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e0d8d0; background: #fff; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; }
.filter-btn.active { background: #e07b4f; border-color: #e07b4f; color: #fff; font-weight: 700; }
.summary-card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; border: 1.5px solid #e0d8d0; }
.summary-label { font-size: 11px; font-weight: 600; color: #bbb; margin-bottom: 10px; }
.mat-grid { display: flex; gap: 8px; }
.mat-cell { flex: 1; background: #faf8f5; border-radius: 9px; padding: 10px 8px; text-align: center; }
.mat-name { font-size: 11px; color: #aaa; margin-bottom: 4px; }
.mat-val { font-size: 20px; font-weight: 700; color: #e07b4f; }
.mat-unit { font-size: 11px; color: #aaa; }
.report-card { width: 100%; background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid #ede8e2; text-align: left; cursor: default; position: relative; box-shadow: 0 1px 4px rgba(0,0,0,0.04); display: block; font-family: inherit; }
.report-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.report-date { font-size: 12px; color: #aaa; }
.report-name { font-size: 16px; font-weight: 700; color: #2d2a26; margin-bottom: 4px; }
.report-sites { font-size: 13px; color: #888; padding-right: 40px; }
.report-arrow { position: absolute; right: 44px; top: 50%; transform: translateY(-50%); color: #ccc; font-size: 22px; }
.delete-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #ddd; font-size: 20px; cursor: pointer; padding: 4px; font-family: inherit; }
.highlight { background: #fff3cd; border-radius: 2px; }
.no-result { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }

/* 折りたたみ */
.collapse-header { display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; }
.collapse-arrow { font-size:13px; color:#aaa; transition:transform 0.2s; }
.collapse-arrow.open { transform:rotate(90deg); }
.collapse-body { display:none; }
.collapse-body.open { display:block; }

/* お知らせ */
.notice-section { margin-top: 24px; }
.notice-title { font-size: 13px; font-weight: 700; color: #aaa; letter-spacing: 0.05em; margin-bottom: 10px; }
.notice-card { background: #fffbf0; border: 1.5px solid #f0c040; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; position: relative; }
.notice-date { font-size: 11px; color: #b8860b; font-weight: 600; margin-bottom: 4px; }
.notice-body { font-size: 14px; color: #2d2a26; line-height: 1.6; white-space: pre-wrap; }
.notice-empty { text-align: center; padding: 20px; color: #ccc; font-size: 14px; }

/* 検索 */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-inp { width: 100%; padding: 11px 36px 11px 40px; border-radius: 10px; border: 1.5px solid #e0d8d0; font-size: 14px; color: #2d2a26; background: #fff; outline: none; font-family: inherit; -webkit-appearance: none; }
.search-ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
.search-clr { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #ccc; font-size: 20px; cursor: pointer; padding: 0; display: none; font-family: inherit; }
.search-result-title { font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 10px; letter-spacing: 0.05em; }
.highlight { background: #fff3cd; border-radius: 2px; }

/* 集計 */
.stats-seg { display: flex; gap: 4px; background: #f5f0ea; border-radius: 10px; padding: 3px; margin-bottom: 20px; }
.stats-seg-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: none; background: transparent; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 500; }
.stats-seg-btn.active { background: #fff; color: #e07b4f; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.stats-row { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; border: 1.5px solid #ede8e2; }
.stats-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.stats-row-label { font-size: 14px; font-weight: 700; color: #2d2a26; }
.stats-row-count { font-size: 12px; color: #aaa; }
.stats-mat-row { display: flex; gap: 6px; }
.stats-mat-chip { flex: 1; background: #faf8f5; border-radius: 7px; padding: 6px 4px; text-align: center; }
.stats-mat-chip-name { font-size: 10px; color: #aaa; margin-bottom: 2px; }
.stats-mat-chip-val { font-size: 15px; font-weight: 700; color: #e07b4f; }
.stats-mat-chip-unit { font-size: 10px; color: #aaa; }
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.month-nav-btn { background: none; border: 1.5px solid #e0d8d0; border-radius: 8px; padding: 6px 14px; font-size: 14px; cursor: pointer; color: #888; font-family: inherit; }
.month-nav-label { font-size: 16px; font-weight: 700; color: #2d2a26; }

/* 下書き */
.draft-bar { background: #fff8e6; border: 1.5px solid #f0c040; border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.draft-bar-text { font-size: 13px; color: #b8860b; font-weight: 600; }
.draft-bar-btns { display: flex; gap: 8px; }
.draft-load-btn { padding: 6px 12px; background: #f0c040; color: #fff; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.draft-del-btn { padding: 6px 10px; background: none; border: 1.5px solid #f0c040; color: #b8860b; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit; }
.btn-draft { width: 100%; padding: 13px; background: #fff; color: #e07b4f; border: 2px solid #e07b4f; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }

/* 休み申請 */
.yasumi-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1.5px solid #ede8e2; }
.yasumi-badge { display: inline-block; background: #f0e8f8; color: #7b4fb0; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; margin-bottom: 6px; }
.status-yasumi { background: #f0e8f8; color: #7b4fb0; }
.btn-yasumi-approve { flex: 1; padding: 10px; background: #f0e8f8; color: #7b4fb0; border: 1.5px solid #ce9ef5; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }

/* 下書きカード */
.draft-report-card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1.5px dashed #aaa; text-align: left; position: relative; font-family: inherit; }
.draft-label { display: inline-block; background: #f0ede8; color: #888; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; margin-bottom: 6px; }
.cal-dot-draft { width: 5px; height: 5px; border-radius: 50%; background: #aaa; }
.draft-submit-btn { width: 100%; padding: 9px; background: #e07b4f; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
.draft-delete-btn { width: 100%; padding: 8px; background: none; border: 1.5px solid #ddd; color: #aaa; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; margin-top: 6px; }

/* カレンダー */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-nav-btn { background: none; border: 1.5px solid #e0d8d0; border-radius: 8px; padding: 6px 14px; font-size: 16px; cursor: pointer; color: #888; font-family: inherit; }
.cal-nav-label { font-size: 17px; font-weight: 700; color: #2d2a26; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 16px; }
.cal-dow { text-align: center; font-size: 11px; font-weight: 600; color: #aaa; padding: 4px 0; }
.cal-dow.sun { color: #e05a5a; }
.cal-dow.sat { color: #4a7ccc; }
.cal-day { border-radius: 8px; padding: 5px 2px; text-align: center; min-height: 52px; cursor: pointer; border: 1.5px solid transparent; background: #fff; transition: all 0.15s; }
.cal-day:active { background: #fdf0e8; }
.cal-day.empty { background: transparent; cursor: default; border-color: transparent; }
.cal-day.today { border-color: #e07b4f; }
.cal-day.has-report { background: #fdf0e8; }
.cal-day.selected { background: #e07b4f; border-color: #e07b4f; }
.cal-day-num { font-size: 13px; font-weight: 600; color: #2d2a26; }
.cal-day.sun .cal-day-num { color: #e05a5a; }
.cal-day.sat .cal-day-num { color: #4a7ccc; }
.cal-day.selected .cal-day-num { color: #fff; }
.cal-day.selected .cal-dot { background: #fff !important; }
.cal-dots { display: flex; justify-content: center; gap: 2px; margin-top: 3px; flex-wrap: wrap; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; background: #e07b4f; }
.cal-day-reports { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid #ede8e2; }
.cal-day-title { font-size: 14px; font-weight: 700; color: #2d2a26; margin-bottom: 12px; }

/* 予定 */
.schedule-card { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; border: 1.5px solid #c5e0f5; position: relative; }
.schedule-badge { display: inline-block; background: #e8f4fd; color: #2980b9; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; margin-bottom: 6px; }
.schedule-site { font-size: 14px; font-weight: 700; color: #2d2a26; margin-bottom: 4px; }
.schedule-content { font-size: 13px; color: #666; }
.schedule-delete { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #ddd; font-size: 18px; cursor: pointer; font-family: inherit; }
.cal-dot-schedule { width: 5px; height: 5px; border-radius: 50%; background: #2980b9; }
.cal-dot-kyuka { width: 5px; height: 5px; border-radius: 50%; background: #27ae60; }
.cal-dot-yasumi { width: 5px; height: 5px; border-radius: 50%; background: #7b4fb0; }
.kyuka-cal-card { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; border: 1.5px solid #a5d6a7; position: relative; }
.kyuka-cal-badge { display: inline-block; background: #e8f5e9; color: #388e3c; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; margin-bottom: 6px; }
.kyuka-cal-name { font-size: 14px; font-weight: 700; color: #2d2a26; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal-box { background: #fff; border-radius: 16px 16px 0 0; padding: 24px 20px; width: 100%; max-width: 540px; }
.modal-title { font-size: 16px; font-weight: 700; color: #2d2a26; margin-bottom: 16px; }
.modal-btn-row { display: flex; gap: 8px; margin-top: 16px; }
.modal-cancel { flex: 1; padding: 12px; background: #f5f0ea; color: #888; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
.modal-save { flex: 2; padding: 12px; background: #e07b4f; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

.add-schedule-btn { width: 100%; padding: 10px; background: #e8f4fd; color: #2980b9; border: 1.5px dashed #2980b9; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; margin-bottom: 12px; }
.schedule-form { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1.5px solid #c5e0f5; }
.schedule-form-title { font-size: 14px; font-weight: 700; color: #2980b9; margin-bottom: 12px; }

/* 詳細 */
.detail-section { margin-bottom: 20px; }
.detail-section-label { font-size: 11px; font-weight: 600; color: #bbb; margin-bottom: 8px; letter-spacing: 0.08em; display: block; }
.weather-tag { background: #fdf0e8; color: #e07b4f; border-radius: 20px; padding: 5px 14px; font-size: 14px; font-weight: 600; display: inline-block; }
.site-result { background: #faf8f5; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.site-result-name { font-size: 14px; font-weight: 700; color: #2d2a26; margin-bottom: 6px; }
.time-result-row { font-size: 13px; color: #888; margin-bottom: 8px; }
.process-result-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.proc-chip { border-radius: 6px; padding: 4px 9px; font-size: 12px; font-weight: 600; }
.proc-chip.done { background: #e07b4f; color: #fff; }
.proc-chip.not-done { background: #f0ede8; color: #ccc; }
.material-result-row { display: flex; flex-wrap: wrap; gap: 5px; }
.material-chip { background: #e8f0e8; color: #4a7c4a; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 600; }
.preview-text { font-size: 14px; color: #2d2a26; line-height: 1.8; }

/* 日報編集モーダル */
#report-edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 300; display: none; overflow-y: auto; }
.report-edit-box { background: #f5f0ea; min-height: 100%; padding: 20px; max-width: 540px; margin: 0 auto; }
.report-edit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.report-edit-title { font-size: 18px; font-weight: 700; color: #2d2a26; }
.report-edit-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; font-family: inherit; }

/* 有給 */
.kyuka-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1.5px solid #ede8e2; }
.kyuka-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.kyuka-name { font-size: 16px; font-weight: 700; color: #2d2a26; }
.kyuka-remain { font-size: 13px; color: #888; }
.kyuka-bar-bg { background: #f0ede8; border-radius: 6px; height: 8px; margin-bottom: 8px; }
.kyuka-bar-fill { background: #e07b4f; border-radius: 6px; height: 8px; transition: width 0.3s; }
.kyuka-stats { display: flex; gap: 8px; }
.kyuka-stat { flex: 1; background: #faf8f5; border-radius: 8px; padding: 8px; text-align: center; }
.kyuka-stat-label { font-size: 10px; color: #aaa; margin-bottom: 2px; }
.kyuka-stat-val { font-size: 16px; font-weight: 700; color: #e07b4f; }
.kyuka-stat-unit { font-size: 10px; color: #aaa; }
.apply-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1.5px solid #ede8e2; }
.apply-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }

<body>

    <div class="tabs">
      <button class="tab active" id="tab-list" onclick="showView('list')">一覧<span class="badge" id="badge">0</span></button>

<div class="body">

  <!-- 入力 -->

    <div class="wrap">

      <div class="field">
        <label class="lbl">氏名</label>
        <select id="staff-name">
          <option value="">選択してください</option>
          <option>加藤瑞樹</option><option>山内浩一</option><option>森田義則</option><option>富山裕貴</option><option>外注</option>
        </select>
      </div>
      <div class="field">
        <label class="lbl">天気</label>
        <div class="weather-grid">
          <button class="weather-btn" data-value="晴れ" onclick="selectWeather(this)">☀️ 晴れ</button>
          <button class="weather-btn" data-value="曇り" onclick="selectWeather(this)">⛅ 曇り</button>
          <button class="weather-btn" data-value="雨" onclick="selectWeather(this)">🌧️ 雨</button>
          <button class="weather-btn" data-value="晴れのち雨" onclick="selectWeather(this)">🌦️ 晴れのち雨</button>
          <button class="weather-btn" data-value="雨のち晴れ" onclick="selectWeather(this)">🌤️ 雨のち晴れ</button>

        <button class="add-btn" onclick="addSite()">＋ 現場を追加</button>

      <div class="field">
        <label class="lbl">次の予定・明日の予定</label>

    </div>
  </div>

  <!-- 完了 -->
  <div class="view" id="view-done">
    <div class="done-wrap">
      <div class="done-icon">✓</div>
      <div class="done-title">提出完了！</div>
      <div class="done-msg">一覧から編集できます</div>
      <button class="btn-primary" style="max-width:280px" onclick="goToList()">一覧を見る</button>
    </div>
  </div>

  <!-- 一覧 -->
  <div class="view active" id="view-list">
    <div class="wrap">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-inp" type="text" id="list-search-input" placeholder="名前・現場名で検索" oninput="onListSearch(this)">
        <button class="search-clr" id="list-search-clear" onclick="clearListSearch()">×</button>

      <div id="list-search-results" style="display:none"></div>

      <!-- お知らせ -->

        <div class="notice-title">📢 お知らせ</div>
        <div id="notice-list"><div class="notice-empty">お知らせはありません</div></div>
        <button id="pin-toggle-btn" onclick="togglePinView()" style="width:100%;margin-top:8px;padding:10px;background:#fff;color:#c97a1f;border:1.5px solid #f0c040;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">📌 ピン留めを見る</button>
        <div id="pin-list" style="display:none;margin-top:10px"></div>
      </div>

      <div id="list-calendar-area">

    </div>

  <!-- 案内図 -->
  <div class="view" id="view-guide">
    <div class="wrap">
      <div id="guide-admin-form" style="display:none">

            <select id="guide-company" onchange="onGuideCompanyChange()">
              <option value="">選択してください</option>

          <div class="field" id="guide-newcompany-field" style="display:none"><label class="lbl">新規会社名</label>
            <input type="text" id="guide-newcompany" placeholder="会社名を入力">
          </div>
          <div class="field"><label class="lbl">現場名・項目名</label>
            <input type="text" id="guide-site" placeholder="現場名や年度など（例: 2026、三鷹5丁目）">
          </div>
          <div class="field"><label class="lbl">PDF または フォルダのURL</label>
            <input type="text" id="guide-url" placeholder="Googleドライブの共有リンク（ファイル・フォルダ両方OK）">
          </div>
          <button class="btn-primary" onclick="addGuide()">追加する</button>
        </div>
      </div>
      <div style="position:relative;margin-bottom:14px">
        <input type="text" id="guide-search" placeholder="🔍 会社名・現場名で検索" oninput="renderGuides()" style="width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #e0d8d0;font-size:14px;font-family:inherit">
      </div>
      <div id="guide-list"></div>

  </div>

  <!-- 集計 -->
  <div class="view" id="view-stats">
    <div class="wrap">
      <div class="stats-seg">
        <button class="stats-seg-btn active" id="seg-site" onclick="setStatsSeg('site')">現場</button>
        <button class="stats-seg-btn" id="seg-total" onclick="setStatsSeg('total')">材料</button>

  <!-- 有給 -->
  <div class="view" id="view-kyuka">
    <div class="wrap">
      <div class="page-title">有給休暇</div>

        <button class="seg-btn active" id="kseg-status" onclick="setKyukaSeg('status')">残日数</button>
        <button class="seg-btn" id="kseg-apply" onclick="setKyukaSeg('apply')">有給申請</button>
        <button class="seg-btn" id="kseg-yasumi" onclick="setKyukaSeg('yasumi')">休み申請</button>
        <button class="seg-btn" id="kseg-history" onclick="setKyukaSeg('history')">申請履歴</button>
      </div>
      <div id="kyuka-content"></div>
    </div>
  </div>

  <!-- 管理者 -->
  <div class="view" id="view-admin">
    <div id="admin-content"></div>
  </div>

  <!-- 詳細 -->

    <div class="wrap" id="detail-content"></div>
  </div>

</div>

    <div class="modal-title">✏️ 予定を編集</div>
    <div class="field"><label class="lbl">日付</label><input type="date" id="edit-date"></div>
    <div class="field"><label class="lbl">現場名</label><input type="text" id="edit-site" placeholder="現場名を入力"></div>

    <div class="modal-btn-row">
      <button class="modal-cancel" onclick="closeEditModal()">キャンセル</button>
      <button class="modal-save" onclick="saveEditSchedule()">保存する</button>
    </div>
  </div>
</div>

<script>
const DB = 'https://daily-report-a1193-default-rtdb.firebaseio.com';
function getLocalDateStr(d=new Date()){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
const PROCESSES = ['現調','下地','マット切り','プライマー','1ply','2ply','トップ','ビックサン','完了'];
const MATERIALS = [{label:'プライマー',field:'primerKg'},{label:'トップ',field:'topKg'}];
const SHITAJI = ['湿気なし','湿気あり','バーナー未使用','バーナー小','バーナー大'];
const KAN_KG = {primerKg:16, topKg:15}; // 1缶あたりのkg
// 現場名の先頭略称 → 取引会社の正式名称
const COMPANY_MAP = {
  'タカラ':'MIRARTHアーキテクト','藤和':'藤和建設','グランディ':'グランディハウス',
  '阿蘇':'阿蘇工業','タクト':'タクトホーム','小笠原':'小笠原工業','CMI':'シーエムアイ',
  '内沢':'内沢工業','相馬':'相馬建装','住友':'住友不動産','久保田':'久保田工務店',
  '大新':'大新工務店','三浦':'三浦工務店','吉野':'吉野建設','トガワ':'トガワ建設サービス',
  'メンテ':'メンテナンス工事','新栄':'新栄サービス','笹森':'笹森工務店',
  'モリタ':'モリタ工務店','ポンユ':'ポンユー興業','住協メンテ':'住協メンテ',
  '手直し':'手直し','手直し是正':'手直し是正','直し':'直し','直し是正':'直し是正'
};
const RESIN_KG_PER_KAN = 18; // 樹脂1缶あたりkg
const WEATHERS = {晴れ:'☀️',曇り:'⛅',雨:'🌧️',晴れのち雨:'🌦️',雨のち晴れ:'🌤️',曇り時々雨:'🌧️'};
const MEMBERS = ['加藤瑞樹','山内浩一','森田義則','富山裕貴','外注'];
const SURNAME_MAP = {'加藤瑞樹':'加藤','山内浩一':'山内','森田義則':'森田','富山裕貴':'富山','外注':'外注'};
const STAFF = ['加藤瑞樹','山内浩一','森田義則','富山裕貴','外注'];
const STAFF_LEAVE = ['加藤瑞樹','山内浩一','森田義則','富山裕貴']; // 有給・休み対象（外注除く）
const ADMIN_PASS = '2431'; // ← 管理者パスワード（変更可）
let leaveSettings = {}; // スタッフごとの付与日数
let absences = {}; // 休み申請

let selectedWeather='', siteCount=0, reports={}, leaves={};
let searchQuery='', filterName='', statsSeg='site', statsMonth=new Date().toLocaleDateString('sv').slice(0,7);
let kyukaSeg='status', adminLoggedIn=false, prevView='form';

document.getElementById('today-label').textContent = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
addSite();
checkDraft();
showView('list');

// 日付変わり自動リロード
const _startDate = getLocalDateStr();
setInterval(()=>{
  const now = getLocalDateStr();
  if(now !== _startDate) location.reload();
}, 60000); // 1分ごとにチェック

// ── ビュー ───────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const tid = (name==='form'||name==='done')?'form':(name==='detail'||name==='list')?'list':name;
  const tabEl = document.getElementById('tab-'+tid);
  if(tabEl) tabEl.classList.add('active');
  if(name==='form') checkDraft();
  if(name==='list') loadReports();
  if(name==='guide') loadGuides();
  if(name==='stats') loadStats();
  if(name==='kyuka') loadKyuka();
  if(name==='admin') showAdmin();
  if(name==='detail') prevView='list';
}

// ── フォーム ─────────────────────
function selectWeather(btn){document.querySelectorAll('.weather-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedWeather=btn.dataset.value;}
function addSite(){
  siteCount++;const id=siteCount;
  const div=document.createElement('div');div.className='site-card';div.id='site-'+id;
  div.innerHTML=`<div class="site-top-row"><input class="site-input" type="text" placeholder="現場名 ${id}" id="site-name-${id}"><button class="remove-btn" onclick="removeSite(${id})">×</button></div>
    <div class="time-row"><div class="time-field"><span class="time-label">🕐 入場</span><input type="time" class="time-input" id="time-in-${id}"></div><span class="time-sep">→</span><div class="time-field"><span class="time-label">退場</span><input type="time" class="time-input" id="time-out-${id}"></div></div>
    <div class="process-grid">${PROCESSES.map(p=>`<button class="proc-btn" data-proc="${p}" onclick="toggleProc(this)">${p}</button>`).join('')}</div>
    <div class="material-section" style="border-top:1px solid #f0ebe5;padding-top:10px;margin-bottom:10px">
        <div class="material-title">下地状況</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
          <button class="proc-btn" data-shitaji="湿気なし" onclick="toggleShitaji(this)">湿気なし</button>
          <button class="proc-btn" data-shitaji="湿気あり" onclick="toggleShitaji(this)">湿気あり</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px">
          <button class="proc-btn" data-shitaji="バーナー未使用" onclick="toggleShitaji(this)">未使用</button>
          <button class="proc-btn" data-shitaji="バーナー小" onclick="toggleShitaji(this)">バーナー小</button>
          <button class="proc-btn" data-shitaji="バーナー大" onclick="toggleShitaji(this)">バーナー大</button>
        </div>
        <div style="font-size:12px;color:#e07b4f;font-weight:600;">🔥 バーナー使用時は写真提出</div>
      </div>
      <div class="material-section"><div class="material-title">材料使用量</div><div class="material-row" id="mat-primer-${id}" style="display:none"><span class="material-label">プライマー</span><input type="number" min="0" step="0.1" placeholder="0.0" class="material-input" id="primerKg-${id}"><span class="material-unit">kg</span></div><div class="material-row" id="mat-resin-${id}" style="display:none"><span class="material-label">樹脂</span><input type="number" min="0" step="1" placeholder="0" class="material-input" id="resinKan-${id}" style="width:60px!important"><span class="material-unit">缶</span><input type="number" min="0" max="9" step="1" placeholder="0" class="material-input" id="resinWari-${id}" style="width:60px!important;margin-left:6px"><span class="material-unit">割</span></div><div class="material-row" id="mat-top-${id}" style="display:none"><span class="material-label">トップ</span><input type="number" min="0" step="0.1" placeholder="0.0" class="material-input" id="topKg-${id}"><span class="material-unit">kg</span></div></div>
    <div class="field" style="margin-top:10px"><label class="lbl">備考</label><textarea id="note-${id}" rows="2" placeholder="一言メモ（任意）" style="width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #e0d8d0;font-size:14px;font-family:inherit;resize:vertical"></textarea></div>`;
  document.getElementById('sites-container').appendChild(div);
}
function removeSite(id){const el=document.getElementById('site-'+id);if(el)el.remove();}
function toggleProc(btn){
  btn.classList.toggle('selected');
  const card=btn.closest('[id^="site-"]');
  const id=card.id.replace('site-','');
  // プライマー連動
  const hasPrimer=!!card.querySelector('[data-proc="プライマー"].selected');
  const primerRow=document.getElementById('mat-primer-'+id);
  if(primerRow)primerRow.style.display=hasPrimer?'flex':'none';
  // 1ply・2ply → 樹脂連動
  const hasResin=!!(card.querySelector('[data-proc="1ply"].selected')||card.querySelector('[data-proc="2ply"].selected'));
  const resinRow=document.getElementById('mat-resin-'+id);
  if(resinRow)resinRow.style.display=hasResin?'flex':'none';
  // トップ連動
  const hasTop=!!card.querySelector('[data-proc="トップ"].selected');
  const topRow=document.getElementById('mat-top-'+id);
  if(topRow)topRow.style.display=hasTop?'flex':'none';
}
function toggleShitaji(btn){
  const card=btn.closest('.site-card');
  if(!card){btn.classList.toggle('selected');return;}
  // 湿気なし・湿気ありは排他選択
  if(btn.dataset.shitaji==='湿気なし'||btn.dataset.shitaji==='湿気あり'){
    card.querySelectorAll('[data-shitaji="湿気なし"],[data-shitaji="湿気あり"]').forEach(b=>{
      if(b!==btn)b.classList.remove('selected');
    });
  }
  // バーナー系は排他選択

function kgToKanWari(kg, kanKg){
  if(!kg||kg===0)return '0';
  const total=Math.round(kg/kanKg*10);
  const kan=Math.floor(total/10);
  const wari=total%10;
  let kanStr='';
  if(kan===0)kanStr=`${wari}割`;
  else if(wari===0)kanStr=`${kan}缶`;
  else kanStr=`${kan}缶${wari}割`;
  return `${kanStr}<br><span style="font-size:11px;color:#aaa">${Math.round(kg*10)/10}kg</span>`;
}

function calcTotals(list){
  const t={primerKg:0,resinKan:0,resinWari:0,topKg:0};
  list.forEach(([,r])=>r.sites?.forEach(s=>{
    MATERIALS.forEach(m=>{const v=parseFloat(s[m.field]);if(!isNaN(v))t[m.field]+=v;});
    const kan=parseInt(s.resinKan)||0;const wari=parseInt(s.resinWari)||0;
    t.resinKan+=kan;t.resinWari+=wari;
  }));
  // 割を缶に繰り上げ
  t.resinKan+=Math.floor(t.resinWari/10);t.resinWari=t.resinWari%10;
  return t;
}

function convertPdfUrl(url){
  if(!url)return url;
  url=url.trim();
  // Googleドライブ フォルダ: そのまま通す
  if(url.includes('drive.google.com/drive/folders/'))return url;
  // Googleドライブ: /file/d/FILEID/view... → プレビュー表示URL
  let m=url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if(m)return 'https://drive.google.com/file/d/'+m[1]+'/view';
  // Googleドライブ: open?id=FILEID
  m=url.match(/drive\.google\.com\/open\?id=([^&]+)/);
  if(m)return 'https://drive.google.com/file/d/'+m[1]+'/view';
  // Dropbox: ?dl=0 や末尾を ?raw=1 に変換
  if(url.includes('dropbox.com')){
    url=url.replace(/[?&]dl=0/,'').replace(/[?&]dl=1/,'');
    return url+(url.includes('?')?'&':'?')+'raw=1';
  }
  return url;
}

  document.getElementById('cal-month-label').textContent=label;
  const today=new Date().toLocaleDateString('sv');

  // 日付ごとの日報数をまとめる
  const byDate={};
  Object.entries(reports).forEach(([key,r])=>{
    if(!r.date)return;
    const ym=r.date.slice(0,7);
    if(ym!==`${calYear}-${String(calMonth+1).padStart(2,'0')}`)return;
    if(!byDate[r.date])byDate[r.date]=[];
    byDate[r.date].push([key,r]);
  });

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const dows=['日','月','火','水','木','金','土'];

  let html=dows.map((d,i)=>`<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(calYear,calMonth,d).getDay();
    const hasReport=byDate[dateStr]?.length>0||Object.values(schedules).some(s=>s.date===dateStr)||Object.values(leaves).some(l=>l.date===dateStr&&l.status==='approved')||Object.values(absences).some(a=>a.date===dateStr&&a.status==='approved')||Object.values(drafts).some(d=>d.date===dateStr);
    const isToday=dateStr===today;
    const isSelected=dateStr===calSelectedDate;
    const count=byDate[dateStr]?.length||0;
    const schedCount=Object.values(schedules).filter(s=>s.date===dateStr).length;
    const hasSchedule=schedCount>0;
    const kyukaCount=Object.values(leaves).filter(l=>l.date===dateStr&&l.status==='approved').length;
    const yasumiCount=Object.values(absences).filter(a=>a.date===dateStr&&a.status==='approved').length;
    const hasKyuka=kyukaCount>0;const hasYasumi=yasumiCount>0;
    const draftCount=Object.values(drafts).filter(d=>d.date===dateStr).length;const hasDraft=draftCount>0;
    const dots=(hasReport||hasSchedule||hasKyuka||hasYasumi||hasDraft)?`<div class="cal-dots">${Array.from({length:Math.min(count,3)}).map(()=>'<div class="cal-dot"></div>').join('')}${Array.from({length:Math.min(schedCount,2)}).map(()=>'<div class="cal-dot cal-dot-schedule"></div>').join('')}${Array.from({length:Math.min(kyukaCount,2)}).map(()=>'<div class="cal-dot cal-dot-kyuka"></div>').join('')}${Array.from({length:Math.min(yasumiCount,2)}).map(()=>'<div class="cal-dot cal-dot-yasumi"></div>').join('')}${Array.from({length:Math.min(draftCount,2)}).map(()=>'<div class="cal-dot cal-dot-draft"></div>').join('')}</div>`:'';
    html+=`<div class="cal-day ${dow===0?'sun':dow===6?'sat':''} ${hasReport?'has-report':''} ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectCalDate('${dateStr}')">
      <div class="cal-day-num">${d}</div>${dots}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  if(calSelectedDate)renderDayReports(calSelectedDate);
  else document.getElementById('cal-day-content').innerHTML='<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">日付をタップすると日報が表示されます</div>';
}

async function submitDraft(key){
  const d=drafts[key];if(!d)return;
  if(!confirm(d.staffName+'の下書きを提出しますか？'))return;
  const report={...d,createdAt:Date.now()};
  try{
    await fetch(DB+'/reports.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(report)});
    await fetch(DB+'/drafts/'+key+'.json',{method:'DELETE'});
    delete drafts[key];
    await loadReports();
    alert('提出しました！');
  }catch(e){alert('提出に失敗しました。');}
}

async function deleteDraftById(key){
  if(!confirm('この下書きを削除しますか？'))return;
  try{
    await fetch(DB+'/drafts/'+key+'.json',{method:'DELETE'});
    delete drafts[key];
    renderCalendar();
  }catch(e){alert('削除に失敗しました。');}
}

function toggleScheduleForm(dateStr){
  const el=document.getElementById('schedule-form-'+dateStr);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

async function submitSchedule(dateStr){
  const actualDate=document.getElementById('sch-date-'+dateStr)?.value||dateStr;
  const site=document.getElementById('sch-site-'+dateStr)?.value.trim();
  const address=document.getElementById('sch-address-'+dateStr)?.value.trim()||'';
  const task=document.getElementById('sch-task-'+dateStr)?.value.trim();
  if(!site){alert('現場名を入力してください');return;}
  try{
    await fetch(DB+'/schedules.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:actualDate,site,address,task,createdAt:Date.now()})});
    await loadSchedules();
    calSelectedDate=actualDate;
    // 別の月の日付に変更された場合はカレンダーの月も移動
    const [y,m]=actualDate.split('-');
    calYear=parseInt(y);calMonth=parseInt(m)-1;
    renderCalendar();
  }catch(e){alert('追加に失敗しました。');}
}

async function deleteSchedule(key,e){
  e.stopPropagation();
  if(!confirm('この予定を削除しますか？'))return;
  try{
    await fetch(DB+'/schedules/'+key+'.json',{method:'DELETE'});
    delete schedules[key];
    renderCalendar();
  }catch(e){alert('削除に失敗しました。');}
}

async function saveEditSchedule(){
  const date = document.getElementById('edit-date').value;

  const task = document.getElementById('edit-task').value.trim();

  try{
    await fetch(DB+'/schedules/'+editingKey+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({date,address,site,task})});

let _openSiteCompanies={};

function getCompanyName(siteName){
  const s=(siteName||'').trim();
  // 手動で会社を設定済みならそれを優先
  if(siteMeta[s]&&siteMeta[s].company)return siteMeta[s].company;
  // 先頭がG（半角/全角）なら住協建設
  if(/^[GＧ]/.test(s))return '住協建設';
  const sp=s.search(/[ 　]/);
  if(sp<0)return '住協建設';
  const prefix=s.slice(0,sp).trim();
  if(!prefix)return '住協建設';
  // 対応表にあれば正式名称、なければ住協建設
  return COMPANY_MAP[prefix]||'住協建設';
}
function getSiteShort(siteName){
  const s=(siteName||'').trim();
  // 手動で会社を設定済みなら現場名はそのまま表示
  if(siteMeta[s]&&siteMeta[s].company)return s;
  // Ｇ始まりは住協建設扱いなので現場名はそのまま表示
  if(/^[GＧ]/.test(s))return s;
  const sp=s.search(/[ 　]/);
  if(sp<0)return s;
  const prefix=s.slice(0,sp).trim();
  if(!prefix)return s;
  // COMPANY_MAPに登録された正式な略称の場合のみ接頭辞を削除
  if(COMPANY_MAP[prefix])return s.slice(sp+1).trim()||s;
  return s;
}

function aggregateSites(){
  // 現場名ごとに全日報を集約
  const sites={};
  Object.entries(reports).forEach(([key,r])=>{
    (r.sites||[]).forEach(s=>{
      const rawName=(s.name||'').trim();
      if(!rawName)return;
      const name=siteAliases[rawName]||rawName;
      if(!sites[name])sites[name]={name,company:getCompanyName(name),completed:false,completedDate:'',workers:{},history:[],primerKg:0,resinKan:0,resinWari:0,topKg:0,shitaji:new Set(),burner:new Set()};
      const site=sites[name];
      const procs=s.processes||[];
      // 完了判定
      if(procs.includes('完了')){site.completed=true;if(!site.completedDate||r.date>site.completedDate)site.completedDate=r.date;}
      // 施工者（現調のみの人は除外）
      const nonGenba=procs.filter(p=>p!=='現調');
      if(nonGenba.length>0 && r.staffName){site.workers[r.staffName]=true;}
      // 工程履歴
      if(procs.length)site.history.push({date:r.date,dateLabel:r.dateLabel||r.date,staff:r.staffName,procs:procs.slice()});
      // 材料合計
      site.primerKg+=parseFloat(s.primerKg)||0;
      site.topKg+=parseFloat(s.topKg)||0;
      const kan=parseInt(s.resinKan)||0,wari=parseInt(s.resinWari)||0;
      site.resinKan+=kan;site.resinWari+=wari;
      // 下地状況
      (s.shitaji||[]).forEach(sh=>{
        if(sh==='湿気なし'||sh==='湿気あり')site.shitaji.add(sh);
        else site.burner.add(sh);
      });
    });
  });
  // 樹脂の割を缶に繰り上げ
  Object.values(sites).forEach(site=>{
    site.resinKan+=Math.floor(site.resinWari/10);
    site.resinWari=site.resinWari%10;
  });
  return sites;
}

function renderSiteListInner(){
  const el=document.getElementById('site-list-inner');

  const kw=(document.getElementById('site-search')?.value||'').trim().toLowerCase();

  // 会社ごとにグループ化
  const groups={};
  completed.forEach(s=>{
    if(siteStaffFilters.length&&!siteStaffFilters.some(m=>s.workers[m]))return;
    if(kw){
      const hit=(s.company||'').toLowerCase().includes(kw)||(s.name||'').toLowerCase().includes(kw);
      if(!hit)return;
    }
    if(!groups[s.company])groups[s.company]=[];
    groups[s.company].push(s);
  });
  const FIXED_BOTTOM_ORDER = ['直し','直し是正','手直し','手直し是正'];
  const normalCompanies = Object.keys(groups).filter(c=>!FIXED_BOTTOM_ORDER.includes(c))
    .sort((a,b)=>groups[b].length-groups[a].length);
  const fixedCompanies = FIXED_BOTTOM_ORDER.filter(c=>groups[c]);
  const companies = [...normalCompanies, ...fixedCompanies];
  if(!companies.length){
    el.innerHTML=kw?'<div class="empty">該当する現場がありません</div>':'<div class="empty">完了した現場がありません</div>';
    return;
  }
  const forceOpen=!!kw;
  el.innerHTML=companies.map(company=>{
    const items=groups[company].sort((a,b)=>(b.completedDate||'').localeCompare(a.completedDate||''));
    const open=forceOpen||_openSiteCompanies[company];

function setKyukaSeg(seg){kyukaSeg=seg;document.querySelectorAll('#view-kyuka .seg-btn').forEach(b=>b.classList.remove('active'));document.getElementById('kseg-'+seg).classList.add('active');renderKyuka();}
function updateAdminBadge(){
  const pending=Object.values(leaves).filter(l=>l.status==='pending').length
    + Object.values(absences).filter(a=>a.status==='pending').length;
  const el=document.getElementById('admin-badge');
  if(!el)return;
  if(pending>0){el.textContent=pending;el.style.display='inline';}
  else el.style.display='none';
}

async function loadKyuka(){
  try{
    const [lRes,sRes,aRes]=await Promise.all([fetch(DB+'/leaves.json'),fetch(DB+'/leaveSettings.json'),fetch(DB+'/absences.json')]);
    leaves=await lRes.json()||{};
    leaveSettings=await sRes.json()||{};
    absences=await aRes.json()||{};
  }catch(e){leaves={};leaveSettings={};absences={};}
  renderKyuka();
  updateAdminBadge();
}
function getKyukaDays(name){ return leaveSettings[name]||0; }
function getLeaveStats(name){
  const all=Object.values(leaves).filter(l=>l.staffName===name);
  const approved=all.filter(l=>l.status==='approved').length;
  const pending=all.filter(l=>l.status==='pending').length;
  const total=getKyukaDays(name);
  return{used:approved,pending,remain:total-approved,total};
}
function renderKyuka(){
  const content=document.getElementById('kyuka-content');
  if(kyukaSeg==='status'){
    content.innerHTML=STAFF_LEAVE.map(name=>{
      const s=getLeaveStats(name);
      const total=s.total||0;
      const pct=total>0?Math.round((s.used/total)*100):0;
      return `<div class="kyuka-card">
        <div class="kyuka-header"><span class="kyuka-name">${name}</span><span class="kyuka-remain">残 ${s.remain}日</span></div>
        <div class="kyuka-bar-bg"><div class="kyuka-bar-fill" style="width:${pct}%"></div></div>
        <div class="kyuka-stats">
          <div class="kyuka-stat"><div class="kyuka-stat-label">付与</div><div class="kyuka-stat-val">${total}</div><div class="kyuka-stat-unit">日</div></div>
          <div class="kyuka-stat"><div class="kyuka-stat-label">取得済</div><div class="kyuka-stat-val">${s.used}</div><div class="kyuka-stat-unit">日</div></div>
          <div class="kyuka-stat"><div class="kyuka-stat-label">申請中</div><div class="kyuka-stat-val">${s.pending}</div><div class="kyuka-stat-unit">件</div></div>

      </div>`;

      <div class="card">

        </div>
        <div class="field"><label class="lbl">休み日</label><input type="date" id="yasumi-date" value="${new Date().toLocaleDateString('sv')}"></div>
        <div class="field"><label class="lbl">理由（任意）</label><textarea id="yasumi-reason" rows="2" placeholder="私用のため など"></textarea></div>
        <button class="btn-primary" onclick="submitYasumi()">申請する</button>
      </div>
      <div style="margin-top:16px">
        <div class="section-title">休み申請 履歴</div>
        ${Object.entries(absences).sort((a,b)=>b[1].createdAt-a[1].createdAt).map(([key,a])=>`
          <div class="yasumi-card">
            <div class="apply-top">
              <div><div class="apply-name">${a.staffName}</div><div class="apply-date">📅 ${a.date}</div></div>
              <span class="status-badge ${a.status==='approved'?'status-approved':a.status==='rejected'?'status-rejected':a.status==='cancelled'?'status-rejected':'status-pending'}">${a.status==='approved'?'承認済':a.status==='rejected'?'却下':a.status==='cancelled'?'取消済':'申請中'}</span>
            </div>
            ${a.reason?`<div class="apply-reason">📝 ${a.reason}</div>`:''}
            ${a.status==='approved'?`<button class="btn-cancel-leave" onclick="cancelAbsence('${key}')">✗ 取り消す</button>`:''}
          </div>`).join('')||'<div class="empty">申請履歴がありません</div>'}
      </div>`;
  }else{
    const list=Object.entries(leaves).sort((a,b)=>b[1].createdAt-a[1].createdAt);

    content.innerHTML=list.map(([key,l])=>`
      <div class="apply-card">
        <div class="apply-top">
          <div><div class="apply-name">${l.staffName}</div><div class="apply-date">📅 ${l.date}</div></div>
          <span class="status-badge ${l.status==='approved'?'status-approved':l.status==='rejected'?'status-rejected':l.status==='cancelled'?'status-rejected':'status-pending'}">${l.status==='approved'?'承認済':l.status==='rejected'?'却下':l.status==='cancelled'?'取消済':'申請中'}</span>
        </div>
        ${l.reason?`<div class="apply-reason">📝 ${l.reason}</div>`:''}
      </div>`).join('');
  }
}
async function submitLeave(){
  const staffName=document.getElementById('leave-name').value;
  const date=document.getElementById('leave-date').value;
  const reason=document.getElementById('leave-reason').value.trim();
  if(!staffName||!date){alert('氏名と取得日を入力してください');return;}
  const s=getLeaveStats(staffName);
  if(getKyukaDays(staffName)===0){alert('付与日数が設定されていません。管理者にお問い合わせください。');return;}
  if(s.remain<=0){alert('有給残日数がありません');return;}
  try{
    await fetch(DB+'/leaves.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({staffName,date,reason,status:'pending',createdAt:Date.now()})});
    alert('申請しました！管理者の承認をお待ちください。');
    await loadKyuka();setKyukaSeg('history');
  }catch(e){alert('申請に失敗しました。');}
}

function calcSalary(name){
  const p=salaryProfiles[name]||{};
  const workDays=parseInt(document.getElementById('sal-days')?.value)||0;
  const kyukaDays=parseInt(document.getElementById('sal-kyuka')?.value)||0;
  const halfDays=parseInt(document.getElementById('sal-half')?.value)||0;
  const incomeTax=parseInt(document.getElementById('sal-income-tax')?.value)||0;
  const expense=parseInt(document.getElementById('sal-expense')?.value)||0;
  const paidDays=workDays+kyukaDays;
  const base=paidDays*(p.dailyRate||0);
  const halfAllow=halfDays*(p.halfRate||0);
  const gross=base+halfAllow+(p.commute||0)+(p.family||0)+expense;
  const employment=Math.round(gross*6/1000);
  const deductTotal=(p.health||0)+(p.pension||0)+employment+incomeTax+(p.residentTax||0)+(p.union||0);
  const net=gross-deductTotal;
  return {p,workDays,kyukaDays,halfDays,incomeTax,expense,paidDays,base,halfAllow,gross,employment,deductTotal,net};
}

  try{
    await fetch(DB+'/salaryData/'+month+'/'+encodeURIComponent(name)+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    alert('保存しました！');

function exportExcel(){
  const month=document.getElementById('export-month')?.value;
  if(!month){alert('対象月を選択してください');return;}
  const [y,m]=month.split('-');
  const label=`${y}年${parseInt(m)}月`;

  // 対象月の日報を絞り込み
  const monthReports=Object.values(reports).filter(r=>r.date?.startsWith(month));

  // ── シート1: 勤怠（作業日数・作業時間） ──
  const kintaiData=[['氏名','作業日数','作業時間（分）','作業時間（時間）']];
  STAFF_LEAVE.forEach(name=>{
    const rList=monthReports.filter(r=>r.staffName===name);
    const days=new Set(rList.map(r=>r.date)).size;
    let mins=0;
    rList.forEach(r=>r.sites?.forEach(s=>{
      if(s.timeIn&&s.timeOut){
        const [ih,im]=s.timeIn.split(':').map(Number);
        const [oh,om]=s.timeOut.split(':').map(Number);
        const d=(oh*60+om)-(ih*60+im);if(d>0)mins+=d;
      }
    }));
    kintaiData.push([name,days,mins,Math.round(mins/60*10)/10]);
  });

  // ── シート2: 材料使用量 ──
  const materialData=[['日付','氏名','現場名','プライマー(kg)','樹脂(缶割)','トップ(kg)']];
  monthReports.sort((a,b)=>a.date?.localeCompare(b.date)).forEach(r=>{
    r.sites?.forEach(s=>{
      if(s.primerKg||s.resinKg||s.topKg){
        materialData.push([r.date,r.staffName,s.name,parseFloat(s.primerKg)||0,`${parseInt(s.resinKan)||0}缶${parseInt(s.resinWari)||0}割`,parseFloat(s.topKg)||0]);
      }
    });
  });

  // ── シート3: 現場・工程 ──
  const genbaData=[['日付','氏名','現場名','入場','退場','下地状況','現調','下地','プライマー','1ply','2ply','トップ']];
  monthReports.sort((a,b)=>a.date?.localeCompare(b.date)).forEach(r=>{
    r.sites?.forEach(s=>{
      genbaData.push([
        r.date,r.staffName,s.name,s.timeIn||'',s.timeOut||'',
        ...PROCESSES.map(p=>s.processes?.includes(p)?'✓':'')
      ]);
    });
  });

  // ── シート4: 有給取得履歴 ──
  const kyukaData=[['氏名','取得日','理由','ステータス']];
  Object.values(leaves).filter(l=>l.date?.startsWith(month)).sort((a,b)=>a.date?.localeCompare(b.date)).forEach(l=>{
    kyukaData.push([l.staffName,l.date,l.reason||'',l.status==='approved'?'承認済':l.status==='rejected'?'却下':'申請中']);
  });

  // Excelブック作成
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(kintaiData),'勤怠');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(materialData),'材料使用量');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(genbaData),'現場・工程');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(kyukaData),'有給履歴');
  XLSX.writeFile(wb,`日報_${label}.xlsx`);
}

function calcWorkStats(seg){
  const now=new Date();
  const todayStr=now.toLocaleDateString('sv');
  let dateFrom='',dateTo='',label='';
  if(seg==='day'){
    dateFrom=document.getElementById('wseg-date-from')?.value||todayStr;
    dateTo=document.getElementById('wseg-date-to')?.value||todayStr;
    if(dateFrom>dateTo){alert('終了日は開始日以降にしてください');return;}
    const f=new Date(dateFrom),t=new Date(dateTo);
    label=`${f.getMonth()+1}月${f.getDate()}日 〜 ${t.getMonth()+1}月${t.getDate()}日`;
  }else{
    const mv=document.getElementById('wseg-month-val')?.value||todayStr.slice(0,7);
    dateFrom=mv+'-01';
    const last=new Date(parseInt(mv.slice(0,4)),parseInt(mv.slice(5,7)),0);
    dateTo=mv+'-'+String(last.getDate()).padStart(2,'0');
    label=`${mv.slice(0,4)}年${parseInt(mv.slice(5,7))}月`;
  }
  const workStats={};
  STAFF_LEAVE.forEach(m=>workStats[m]={days:new Set(),minutes:0});
  Object.values(window._allReports||reports).forEach(r=>{
    if(!workStats[r.staffName])return;
    if(!r.date||r.date<dateFrom||r.date>dateTo)return;
    workStats[r.staffName].days.add(r.date);
    r.sites?.forEach(s=>{
      if(s.timeIn&&s.timeOut){
        const [ih,im]=s.timeIn.split(':').map(Number);
        const [oh,om]=s.timeOut.split(':').map(Number);
        const diff=(oh*60+om)-(ih*60+im);
        if(diff>0)workStats[r.staffName].minutes+=diff;
      }
    });
  });
  const labelEl=document.getElementById('work-stats-label');
  const gridEl=document.getElementById('work-stats-grid');
  if(labelEl)labelEl.textContent=label;
  // 月表示のみ：有給・休み日数＋日曜除く稼働可能日数を追加
  let kyukaByPerson={},yasumiByPerson={},possibleDays=0;
  if(seg==='month'){
    STAFF_LEAVE.forEach(m=>{kyukaByPerson[m]=0;yasumiByPerson[m]=0;});
    Object.values(leaves).forEach(l=>{
      if(l.status==='approved'&&l.date>=dateFrom&&l.date<=dateTo&&kyukaByPerson[l.staffName]!==undefined)
        kyukaByPerson[l.staffName]++;
    });
    Object.values(absences).forEach(a=>{
      if(a.status==='approved'&&a.date>=dateFrom&&a.date<=dateTo&&yasumiByPerson[a.staffName]!==undefined)
        yasumiByPerson[a.staffName]++;
    });
    // 日曜除く稼働可能日数を計算
    const cur=new Date(dateFrom);
    const end=new Date(dateTo);
    while(cur<=end){
      if(cur.getDay()!==0)possibleDays++;
      cur.setDate(cur.getDate()+1);
    }
  }

  if(gridEl)gridEl.innerHTML=STAFF_LEAVE.map(m=>{
    const s=workStats[m];
    const h=Math.floor(s.minutes/60);const min=s.minutes%60;
    const kyuka=kyukaByPerson[m]||0;
    const yasumi=yasumiByPerson[m]||0;
    return `<div class="admin-stat-card">
      <div class="admin-stat-name">${m}</div>
      <div class="admin-stat-row"><span class="admin-stat-key">作業日数</span><span class="admin-stat-val">${s.days.size}日${seg==='month'?` / ${possibleDays}日`+`<span style="font-size:10px;color:#aaa">（日曜除く）</span>`:''}</span></div>
      <div class="admin-stat-row"><span class="admin-stat-key">作業時間</span><span class="admin-stat-val">${h}h${min}m</span></div>
      ${seg==='month'?`
      <div class="admin-stat-row"><span class="admin-stat-key">🏖️ 有給</span><span class="admin-stat-val" style="color:#388e3c">${kyuka}日</span></div>
      <div class="admin-stat-row"><span class="admin-stat-key">😴 休み</span><span class="admin-stat-val" style="color:#7b4fb0">${yasumi}日</span></div>`:''}
    </div>`;
  }).join('');
}

        ${s.shitaji?.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${s.shitaji.map(sh=>`<span style="background:#e8f0e8;color:#2d6a2d;border-radius:6px;padding:4px 9px;font-size:12px;font-weight:600">🌡 ${sh}</span>`).join('')}</div>`:''}
        <div class="process-result-row">${PROCESSES.map(p=>`<span class="proc-chip ${s.processes?.includes(p)?'done':'not-done'}">${p}</span>`).join('')}</div>
        ${(s.primerKg||s.resinKan||s.resinWari||s.topKg)?`<div class="material-result-row">${s.primerKg?`<span class="material-chip">プライマー ${s.primerKg}kg</span>`:''} ${(s.resinKan||s.resinWari)?`<span class="material-chip">樹脂 ${s.resinKan||0}缶${s.resinWari||0}割</span>`:''} ${s.topKg?`<span class="material-chip">トップ ${s.topKg}kg</span>`:''}</div>`:''}
        ${s.note?`<div style="margin-top:8px;padding:8px 10px;background:#fff8ee;border-radius:8px;font-size:13px;color:#7a6a55">📝 ${s.note}</div>`:''}
      </div>`).join('')}
    </div>
    <div class="detail-section"><span class="detail-section-label">次の予定・明日の予定</span><div class="preview-text">${r.tomorrow}</div></div>`;
  showView('detail');
}
</script>
</body>
</html>

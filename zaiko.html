<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="材料管理">
<title>材料管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f0ea; min-height: 100vh; }

.header { background: #fff; border-bottom: 1px solid #ede8e2; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.header-inner { max-width: 540px; margin: 0 auto; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.logo { font-size: 16px; font-weight: 700; color: #2d2a26; white-space: nowrap; }
.tabs { display: flex; gap: 2px; background: #f5f0ea; border-radius: 10px; padding: 3px; }
.tab { padding: 6px 10px; border-radius: 7px; border: none; background: transparent; color: #888; font-size: 12px; cursor: pointer; font-weight: 500; font-family: inherit; white-space: nowrap; }
.tab.active { background: #e07b4f; color: #fff; font-weight: 700; }

.body { max-width: 540px; margin: 0 auto; padding: 0 0 60px; }
.view { display: none; }
.view.active { display: block; }
.wrap { padding: 16px; }

/* 共通 */
label.lbl { display: block; font-weight: 600; font-size: 14px; color: #2d2a26; margin-bottom: 8px; }
.field { margin-bottom: 16px; }
select, input[type=text], input[type=date], input[type=number], input[type=password] {
  width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #e0d8d0;
  font-size: 15px; color: #2d2a26; background: #fff; outline: none; font-family: inherit;
  appearance: none; -webkit-appearance: none;
}
.btn-primary { width: 100%; padding: 14px; background: #e07b4f; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-secondary { width: 100%; padding: 12px; background: #fff; color: #888; border: 1.5px solid #e0d8d0; border-radius: 12px; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px; }
.card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid #ede8e2; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.section-title { font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 10px; letter-spacing: 0.05em; }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
.empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }
.page-title { font-size: 18px; font-weight: 700; color: #2d2a26; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #aaa; margin-bottom: 20px; }

/* 在庫一覧 */
.stock-item { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; border: 1.5px solid #ede8e2; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.stock-item.low { border-color: #f0c040; background: #fffbf0; }
.stock-item.empty-stock { border-color: #ef9a9a; background: #fff5f5; }
.stock-icon { width: 40px; height: 40px; border-radius: 10px; background: #fdf0e8; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.stock-icon.low { background: #fff8e6; }
.stock-icon.empty-stock { background: #fce8e8; }
.stock-info { flex: 1; min-width: 0; }
.stock-name { font-size: 14px; font-weight: 700; color: #2d2a26; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stock-cat { font-size: 11px; color: #aaa; }
.stock-qty { text-align: right; flex-shrink: 0; }
.stock-num { font-size: 22px; font-weight: 700; color: #e07b4f; line-height: 1; }
.stock-num.low { color: #d4a017; }
.stock-num.empty-stock { color: #d32f2f; }
.stock-unit { font-size: 11px; color: #aaa; margin-top: 2px; }
.stock-alert { font-size: 10px; color: #d4a017; font-weight: 700; margin-top: 2px; }
.stock-alert.out { color: #d32f2f; }

/* フィルターバー */
.filter-row { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
.filter-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e0d8d0; background: #fff; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; }
.filter-btn.active { background: #e07b4f; border-color: #e07b4f; color: #fff; font-weight: 700; }

/* 入出庫フォーム */
.type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 18px; }
.type-btn { padding: 14px; border-radius: 12px; border: 2px solid #e0d8d0; background: #fff; color: #888; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; text-align: center; transition: all 0.15s; }
.type-btn.in.selected { background: #e8f5e9; border-color: #388e3c; color: #388e3c; }
.type-btn.out.selected { background: #fdf0e8; border-color: #e07b4f; color: #e07b4f; }
.qty-row { display: flex; gap: 8px; align-items: flex-end; }
.qty-input { flex: 1; }
.qty-unit-label { font-size: 14px; color: #888; padding-bottom: 14px; white-space: nowrap; }

/* 履歴 */
.history-item { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1.5px solid #ede8e2; display: flex; align-items: center; gap: 10px; }
.hist-badge { flex-shrink: 0; width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
.hist-badge.in { background: #e8f5e9; color: #388e3c; }
.hist-badge.out { background: #fdf0e8; color: #e07b4f; }
.hist-info { flex: 1; min-width: 0; }
.hist-name { font-size: 14px; font-weight: 700; color: #2d2a26; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-meta { font-size: 12px; color: #aaa; margin-top: 2px; }
.hist-qty { text-align: right; flex-shrink: 0; }
.hist-qty-num { font-size: 18px; font-weight: 700; }
.hist-qty-num.in { color: #388e3c; }
.hist-qty-num.out { color: #e07b4f; }
.hist-qty-unit { font-size: 11px; color: #aaa; }

/* 管理 */
.admin-lock { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; }
.lock-icon { font-size: 48px; margin-bottom: 16px; }
.lock-title { font-size: 18px; font-weight: 700; color: #2d2a26; margin-bottom: 8px; }
.lock-sub { font-size: 13px; color: #aaa; margin-bottom: 24px; text-align: center; }
.logout-btn { background: none; border: none; color: #aaa; font-size: 13px; cursor: pointer; font-family: inherit; padding: 8px 0; }

.item-edit-row { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; border: 1.5px solid #ede8e2; }
.item-edit-name { font-size: 14px; font-weight: 700; color: #2d2a26; margin-bottom: 8px; }
.item-edit-fields { display: flex; gap: 8px; align-items: center; }
.item-edit-fields input { flex: 1; padding: 8px 10px; border-radius: 8px; border: 1.5px solid #e0d8d0; font-size: 13px; font-family: inherit; }
.item-edit-fields span { font-size: 12px; color: #aaa; white-space: nowrap; }
.save-item-btn { padding: 7px 12px; background: #e07b4f; color: #fff; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }

/* 集計 */
.stats-seg { display: flex; gap: 4px; background: #f5f0ea; border-radius: 10px; padding: 3px; margin-bottom: 16px; }
.stats-seg-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: none; background: transparent; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 500; }
.stats-seg-btn.active { background: #fff; color: #e07b4f; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.month-nav-btn { background: none; border: 1.5px solid #e0d8d0; border-radius: 8px; padding: 6px 14px; font-size: 14px; cursor: pointer; color: #888; font-family: inherit; }
.month-nav-label { font-size: 16px; font-weight: 700; color: #2d2a26; }
.stats-row { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; border: 1.5px solid #ede8e2; display: flex; align-items: center; justify-content: space-between; }
.stats-label { font-size: 14px; font-weight: 600; color: #2d2a26; }
.stats-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.stats-vals { text-align: right; }
.stats-in { font-size: 13px; color: #388e3c; font-weight: 700; }
.stats-out { font-size: 13px; color: #e07b4f; font-weight: 700; }

/* 削除ボタン */
.delete-btn { background: none; border: none; color: #ddd; font-size: 18px; cursor: pointer; padding: 4px; font-family: inherit; }

/* サマリーバー */
.summary-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.summary-cell { background: #fff; border-radius: 10px; padding: 10px 8px; text-align: center; border: 1.5px solid #ede8e2; }
.summary-cell-label { font-size: 10px; color: #aaa; margin-bottom: 4px; }
.summary-cell-val { font-size: 20px; font-weight: 700; color: #2d2a26; }
.summary-cell-val.warn { color: #d4a017; }
.summary-cell-val.danger { color: #d32f2f; }

/* モーダル */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal-box { background: #fff; border-radius: 16px 16px 0 0; padding: 24px 20px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; color: #2d2a26; margin-bottom: 16px; }
.modal-btn-row { display: flex; gap: 8px; margin-top: 16px; }
.modal-cancel { flex: 1; padding: 12px; background: #f5f0ea; color: #888; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
.modal-save { flex: 2; padding: 12px; background: #e07b4f; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

/* 完了トースト */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2d2a26; color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* カテゴリバッジ */
.cat-badge { display: inline-block; border-radius: 6px; padding: 2px 7px; font-size: 10px; font-weight: 700; margin-left: 6px; }
.cat-frp { background: #e8f0fd; color: #2858b0; }
.cat-tool { background: #f0e8fd; color: #6b2eb0; }
.cat-consume { background: #e8fdf0; color: #1a7a42; }
.cat-drain { background: #fdf4e8; color: #a05010; }
.cat-other { background: #f0ede8; color: #666; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <span class="logo">📦 材料管理</span>
    <div class="tabs">
      <button class="tab active" id="tab-move" onclick="showView('move')">入出庫</button>
      <button class="tab" id="tab-history" onclick="showView('history')">履歴</button>
      <button class="tab" id="tab-stats" onclick="showView('stats')">集計</button>
      <button class="tab" id="tab-stock" onclick="showView('stock')">在庫</button>
      <button class="tab" id="tab-admin" onclick="showView('admin')">管理</button>
    </div>
  </div>
</div>

<div class="body">

  <!-- 在庫一覧 -->
  <div class="view" id="view-stock">
    <div class="wrap">
      <div id="stock-summary" class="summary-bar"></div>
      <div id="cat-filter-row" style="position:sticky;top:56px;z-index:50;background:#f5f0ea;padding:6px 0 4px;margin:0 -16px;padding-left:16px;overflow-x:auto;display:flex;gap:6px;-webkit-overflow-scrolling:touch"></div>
      <div id="stock-list" style="margin-top:4px"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- 入出庫 -->
  <div class="view active" id="view-move">
    <div class="wrap">

      <!-- STEP1: 名前・日付 -->
      <div id="move-step1">
        <div class="page-title">入出庫登録</div>
        <div class="page-sub" style="margin-bottom:16px">まず名前と日付を入力してください</div>
        <div class="field">
          <label class="lbl">スタッフ</label>
          <select id="move-staff-top">
            <option value="">選択してください</option>
            <option>加藤瑞樹</option><option>山内浩一</option><option>森田義則</option><option>富山裕貴</option><option>外注</option>
          </select>
        </div>
        <div class="field">
          <label class="lbl">日付</label>
          <input type="date" id="move-date-top">
        </div>
        <div class="type-toggle" style="margin-top:4px">
          <button class="type-btn out selected" id="type-out" onclick="goToMoveList('out')">📤 持ち出し</button>
          <button class="type-btn in" id="type-in" onclick="goToMoveList('in')">📥 入庫</button>
        </div>
        <button class="btn-secondary" style="margin-top:8px" onclick="showBulkModal()">📋 一括持ち出し（表から入力）</button>
      </div>

      <!-- STEP2: 品目リスト -->
      <div id="move-step2" style="display:none">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <button onclick="backToStep1()" style="background:none;border:none;color:#e07b4f;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:0">← 戻る</button>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:#2d2a26" id="move-step2-label"></div>
            <div style="font-size:11px;color:#aaa" id="move-step2-sub"></div>
          </div>
        </div>
        <div id="move-cat-filter-row" style="position:sticky;top:56px;z-index:50;background:#f5f0ea;padding:6px 0 4px;margin:0 -16px;padding-left:16px;overflow-x:auto;display:flex;gap:6px;-webkit-overflow-scrolling:touch"></div>
        <div id="move-item-list" style="margin-top:4px"></div>
        <div id="move-bulk-submit-bar" style="display:none;position:sticky;bottom:8px;margin-top:12px">
          <button class="btn-primary" onclick="goToConfirm()">確認画面へ →</button>
        </div>
      </div>

      <!-- STEP3: 確認画面 -->
      <div id="move-step3" style="display:none">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <button onclick="backToStep2()" style="background:none;border:none;color:#e07b4f;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:0">← 戻る</button>
          <div style="flex:1">
            <div style="font-size:15px;font-weight:700;color:#2d2a26">📋 持ち出し確認</div>
            <div style="font-size:11px;color:#aaa" id="move-step3-sub"></div>
          </div>
        </div>
        <div id="confirm-list"></div>
        <div style="margin-top:12px;background:#fff;border-radius:12px;padding:12px;border:1.5px dashed #e0d8d0">
          <div style="font-size:12px;font-weight:600;color:#aaa;margin-bottom:8px">＋ 品目を追加</div>
          <div style="display:flex;gap:8px;align-items:center">
            <select id="confirm-add-item" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid #e0d8d0;font-size:14px;font-family:inherit;background:#fff">
              <option value="">品目を選択</option>
            </select>
            <input type="number" min="0" step="0.1" placeholder="0" id="confirm-add-qty"
              style="width:64px;padding:10px 6px;border-radius:8px;border:1.5px solid #e0d8d0;font-size:15px;text-align:center;font-family:inherit">
            <span id="confirm-add-unit" style="font-size:12px;color:#aaa;white-space:nowrap">―</span>
            <button onclick="confirmAddItem()" style="padding:10px 14px;background:#e07b4f;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">追加</button>
          </div>
        </div>
        <div style="margin-top:12px">
          <button class="btn-primary" onclick="submitBulkOut()">📤 登録する</button>
        </div>
      </div>

    </div>
  </div>

  <!-- 履歴 -->
  <div class="view" id="view-history">
    <div class="wrap">

      <!-- 検索ボックス -->
      <div class="search-wrap" style="margin-bottom:10px">
        <span class="search-ico">🔍</span>
        <input class="search-inp" type="text" id="hist-search-input" placeholder="品目名・メモで検索" oninput="onHistSearch(this.value)">
        <button class="search-clr" id="hist-search-clear" onclick="clearHistSearch()" style="display:none">×</button>
      </div>

      <!-- 期間タブ -->
      <div class="stats-seg" style="margin-bottom:12px">
        <button class="stats-seg-btn active" id="hseg-day" onclick="setHistSeg('day')">日別</button>
        <button class="stats-seg-btn" id="hseg-month" onclick="setHistSeg('month')">月別</button>
        <button class="stats-seg-btn" id="hseg-range" onclick="setHistSeg('range')">期間検索</button>
      </div>

      <!-- 月別：月ナビ -->
      <div id="hist-month-picker" style="display:none;margin-bottom:10px">
        <div class="month-nav">
          <button class="month-nav-btn" onclick="changeHistYearMonth(-1)">◀</button>
          <span class="month-nav-label" id="hist-yearmonth-label"></span>
          <button class="month-nav-btn" onclick="changeHistYearMonth(1)">▶</button>
        </div>
      </div>

      <!-- 期間検索 -->
      <div id="hist-range-picker" style="display:none;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <input type="date" id="hist-range-from" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid #e0d8d0;font-size:13px;font-family:inherit">
          <span style="color:#aaa">〜</span>
          <input type="date" id="hist-range-to" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid #e0d8d0;font-size:13px;font-family:inherit">
          <button onclick="renderHistory()" style="padding:8px 14px;background:#e07b4f;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">表示</button>
        </div>
      </div>

      <!-- 共通フィルター -->
      <div class="filter-row" id="hist-type-filter-row" style="margin-bottom:6px">
        <button class="filter-btn active" onclick="setHistTypeFilter('all',this)">すべて</button>
        <button class="filter-btn" onclick="setHistTypeFilter('out',this)">📤 持ち出し</button>
        <button class="filter-btn" onclick="setHistTypeFilter('in',this)">📥 入庫</button>
      </div>
      <div class="filter-row" id="hist-cat-filter-row" style="margin-bottom:6px"></div>
      <div class="filter-row" id="hist-staff-filter-row" style="margin-bottom:10px">
        <button class="filter-btn active" onclick="setHistStaffFilter('all',this)">全員</button>
        <button class="filter-btn" onclick="setHistStaffFilter('加藤瑞樹',this)">加藤</button>
        <button class="filter-btn" onclick="setHistStaffFilter('山内浩一',this)">山内</button>
        <button class="filter-btn" onclick="setHistStaffFilter('森田義則',this)">森田</button>
        <button class="filter-btn" onclick="setHistStaffFilter('富山裕貴',this)">富山</button>
        <button class="filter-btn" onclick="setHistStaffFilter('外注',this)">外注</button>
      </div>

      <!-- 日別：カレンダー -->
      <div id="hist-day-picker" style="margin-top:4px">
        <div class="month-nav">
          <button class="month-nav-btn" onclick="changeHistMonth(-1)">◀</button>
          <span class="month-nav-label" id="hist-month-label"></span>
          <button class="month-nav-btn" onclick="changeHistMonth(1)">▶</button>
        </div>
        <div id="hist-cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px"></div>
      </div>

      <div id="history-list"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- 集計 -->
  <div class="view" id="view-stats">
    <div class="wrap">
      <div class="search-wrap" style="margin-bottom:10px">
        <span class="search-ico">🔍</span>
        <input class="search-inp" type="text" id="stats-search-input" placeholder="品目名で検索" oninput="onStatsSearch(this.value)">
        <button class="search-clr" id="stats-search-clear" onclick="clearStatsSearch()" style="display:none">×</button>
      </div>
      <div class="stats-seg" style="margin-bottom:12px">
        <button class="stats-seg-btn active" id="sseg-out" onclick="setStatsSeg('out')">📤 持ち出し表</button>
        <button class="stats-seg-btn" id="sseg-in" onclick="setStatsSeg('in')">📥 入庫表</button>
      </div>
      <!-- 期間モード切替 -->
      <div style="display:flex;gap:4px;background:#f5f0ea;border-radius:10px;padding:3px;margin-bottom:12px">
        <button class="stats-seg-btn active" id="speriod-month" onclick="setStatsPeriod('month')" style="flex:1">月別</button>
        <button class="stats-seg-btn" id="speriod-range" onclick="setStatsPeriod('range')" style="flex:1">期間指定</button>
      </div>

function getAlertVal(itemId) {

function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function loadAll() {
  try {
    const [invRes, movRes, alertRes] = await Promise.all([
      fetch(DB + '/inventory.json'),
      fetch(DB + '/movements.json'),
      fetch(DB + '/alertSettings.json')
    ]);
    inventory = await invRes.json() || {};
    movements = await movRes.json() || {};
    alertSettings = await alertRes.json() || {};
  } catch(e) {
    inventory = {}; movements = {}; alertSettings = {};
  }
}

// ── ビュー切替 ──
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');

  if (name === 'stock') { loadAll().then(() => renderStock()); }
  if (name === 'move') {
    document.getElementById('move-step1').style.display = 'block';
    document.getElementById('move-step2').style.display = 'none';
    document.getElementById('move-date-top').value = getToday();
    loadAll().then(() => {});
  }
  if (name === 'history') { loadAll().then(() => { renderHistCalendar(); renderHistory(); }); }
  if (name === 'stats') { loadAll().then(() => renderStats()); }
  if (name === 'admin') showAdmin();
}

// ── 在庫一覧 ──
function buildCatFilter() {
  const el = document.getElementById('cat-filter-row');
  const cats = ['all', 'frp', 'sub', 'drain', 'tool', 'consume'];
  const labels = { all: 'すべて', frp: 'FRP材', sub: '副資材', drain: 'ドレン', tool: '工具', consume: '消耗品' };
  el.innerHTML = cats.map(c => `<button class="filter-btn ${catFilter === c ? 'active' : ''}" style="flex-shrink:0" onclick="setCatFilter('${c}', this)">${labels[c]}</button>`).join('');
}

function setCatFilter(cat, btn) {
  catFilter = cat;
  document.querySelectorAll('#cat-filter-row .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStock();
}

function getQty(itemId) {
  return parseFloat(inventory[itemId]) || 0;
}

function renderStock() {
  buildCatFilter();
  const items = catFilter === 'all' ? ITEMS_MASTER : ITEMS_MASTER.filter(i => i.category === catFilter);

  // サマリー
  const total = ITEMS_MASTER.length;
  const low = ITEMS_MASTER.filter(i => { const q = getQty(i.id); return q > 0 && q <= i.alert; }).length;
  const out = ITEMS_MASTER.filter(i => getQty(i.id) <= 0).length;
  document.getElementById('stock-summary').innerHTML = `
    <div class="summary-cell"><div class="summary-cell-label">品目数</div><div class="summary-cell-val">${total}</div></div>
    <div class="summary-cell"><div class="summary-cell-label">⚠️ 残少</div><div class="summary-cell-val warn">${low}</div></div>
    <div class="summary-cell"><div class="summary-cell-label">🔴 在庫切</div><div class="summary-cell-val danger">${out}</div></div>
  `;

  if (!items.length) { document.getElementById('stock-list').innerHTML = '<div class="empty">品目がありません</div>'; return; }

  // カテゴリごとにグループ化
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });

  let html = '';
  Object.entries(grouped).forEach(([cat, list]) => {
    html += `<div class="section-title" style="margin-top:12px">${CAT_LABELS[cat] || cat}</div>`;
    list.forEach(item => {
      const qty = getQty(item.id);
      const isLow = qty > 0 && qty <= getAlertVal(item.id);
      const isEmpty = qty <= 0;
      const cls = isEmpty ? 'empty-stock' : isLow ? 'low' : '';
      const icon = isEmpty ? '❌' : isLow ? '⚠️' : getItemIcon(item.category);
      html += `<div class="stock-item ${cls}" onclick="quickMove('${item.id}')">
        <div class="stock-icon ${cls}">${icon}</div>
        <div class="stock-info">
          <div class="stock-name">${item.name}</div>
          <div class="stock-cat">${CAT_LABELS[item.category]} ・ アラート: ${item.alert}${item.unit}</div>
        </div>
        <div class="stock-qty">
          <div class="stock-num ${cls}">${qty % 1 === 0 ? qty : qty.toFixed(1)}</div>
          <div class="stock-unit">${item.unit}</div>
          ${isEmpty ? '<div class="stock-alert out">在庫切れ</div>' : isLow ? '<div class="stock-alert">残少</div>' : ''}
        </div>
      </div>`;
    });
  });
  document.getElementById('stock-list').innerHTML = html;
}

function getItemIcon(cat) {
  const icons = { frp: '🪣', drain: '🔩', tool: '🛠', consume: '📦' };
  return icons[cat] || '📦';
}

function quickMove(itemId) {
  const item = ITEMS_MASTER.find(i => i.id === itemId);
  if (!item) return;
  document.getElementById('move-item').value = itemId;
  document.getElementById('move-unit-label').textContent = item.unit;
  showView('move');
}

  const el = document.getElementById('move-cat-filter-row');

  const cats = ['all', 'frp', 'sub', 'drain', 'tool', 'consume'];
  const labels = { all: 'すべて', frp: 'FRP材', sub: '副資材', drain: 'ドレン', tool: '工具', consume: '消耗品' };
  el.innerHTML = cats.map(c => `<button class="filter-btn ${moveCatFilter === c ? 'active' : ''}" style="flex-shrink:0" onclick="setMoveCatFilter('${c}', this)">${labels[c]}</button>`).join('');
}

function setMoveCatFilter(cat, btn) {
  moveCatFilter = cat;
  document.querySelectorAll('#move-cat-filter-row .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMoveList();
}

function renderMoveList() {
  buildMoveCatFilter();
  const el = document.getElementById('move-item-list');
  if (!el) return;
  const items = moveCatFilter === 'all' ? ITEMS_MASTER : ITEMS_MASTER.filter(i => i.category === moveCatFilter);

  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });

  // 一括登録バーの表示制御
  const bulkBar = document.getElementById('move-bulk-submit-bar');
  if (bulkBar) bulkBar.style.display = moveType === 'out' ? 'block' : 'none';

  let html = '';
  if (moveType === 'out') {
    // 持ち出し：数量入力欄付き一覧
    Object.entries(grouped).forEach(([cat, list]) => {
      html += `<div class="section-title" style="margin-top:12px">${CAT_LABELS[cat] || cat}</div>`;
      list.forEach(item => {
        const qty = getQty(item.id);
        const isLow = qty > 0 && qty <= getAlertVal(item.id);
        const isEmpty = qty <= 0;
        const cls = isEmpty ? 'empty-stock' : isLow ? 'low' : '';
        html += `<div class="stock-item ${cls}" style="padding:10px 12px">
          <div class="stock-info">
            <div class="stock-name">${item.name}</div>
            <div class="stock-cat">在庫: ${qty % 1 === 0 ? qty : qty.toFixed(1)}${item.unit}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <input type="number" min="0" step="${item.step || 1}" placeholder="0"
              id="out-qty-${item.id}"
              value="${outQtyMap[item.id] || ''}"
              oninput="onOutQtyInput('${item.id}', this.value)"
              style="width:64px;padding:8px 6px;border-radius:8px;border:1.5px solid #e0d8d0;font-size:16px;text-align:center;font-family:inherit;background:#fff">
            <span style="font-size:12px;color:#aaa">${item.unit}</span>
          </div>
        </div>`;
      });
    });
  } else {
    // 入庫：品目タップ→モーダル
    Object.entries(grouped).forEach(([cat, list]) => {
      html += `<div class="section-title" style="margin-top:12px">${CAT_LABELS[cat] || cat}</div>`;
      list.forEach(item => {
        const qty = getQty(item.id);
        const isLow = qty > 0 && qty <= getAlertVal(item.id);
        const isEmpty = qty <= 0;
        const cls = isEmpty ? 'empty-stock' : isLow ? 'low' : '';
        const icon = isEmpty ? '❌' : isLow ? '⚠️' : getItemIcon(item.category);
        html += `<div class="stock-item ${cls}" onclick="openItemMoveModal('${item.id}')" style="cursor:pointer">
          <div class="stock-icon ${cls}">${icon}</div>
          <div class="stock-info">
            <div class="stock-name">${item.name}</div>
            <div class="stock-cat">${CAT_LABELS[item.category]}</div>
          </div>
          <div class="stock-qty">
            <div class="stock-num ${cls}">${qty % 1 === 0 ? qty : qty.toFixed(1)}</div>
            <div class="stock-unit">${item.unit}</div>
            ${isEmpty ? '<div class="stock-alert out">在庫切れ</div>' : isLow ? '<div class="stock-alert">残少</div>' : ''}
          </div>
          <div style="color:#388e3c;font-size:20px;padding-left:4px;flex-shrink:0">›</div>
        </div>`;
      });
    });
  }
  el.innerHTML = html || '<div class="empty">品目がありません</div>';
}

let confirmEntries = []; // {itemId, itemName, unit, qty}
let outQtyMap = {}; // {itemId: qty} フィルター切替時も値を保持

function onOutQtyInput(itemId, val) {
  const qty = parseFloat(val) || 0;
  if (qty > 0) outQtyMap[itemId] = qty;
  else delete outQtyMap[itemId];
  const hasAny = Object.keys(outQtyMap).length > 0;
  const btn = document.querySelector('#move-bulk-submit-bar .btn-primary');
  if (btn) btn.style.opacity = hasAny ? '1' : '0.5';
}

function goToConfirm() {
  // outQtyMapから収集
  confirmEntries = [];
  // 現在表示中の入力欄の値をまずoutQtyMapに保存
  ITEMS_MASTER.forEach(item => {
    const el = document.getElementById('out-qty-' + item.id);
    if (el) {
      const val = parseFloat(el.value) || 0;
      if (val > 0) outQtyMap[item.id] = val;
      else delete outQtyMap[item.id];
    }
  });
  Object.entries(outQtyMap).forEach(([itemId, qty]) => {
    const item = ITEMS_MASTER.find(i => i.id === itemId);
    if (item) confirmEntries.push({ itemId: item.id, itemName: item.name, unit: item.unit, qty });
  });
  if (!confirmEntries.length) { alert('持ち出し数量を1つ以上入力してください'); return; }

  const staff = document.getElementById('move-staff-top').value;
  const date = document.getElementById('move-date-top').value;
  document.getElementById('move-step3-sub').textContent = staff + '　' + date;

  // 追加品目セレクトを構築
  buildConfirmAddSelect();

  document.getElementById('move-step2').style.display = 'none';
  document.getElementById('move-step3').style.display = 'block';
  renderConfirmList();
}

function backToStep2() {
  document.getElementById('move-step3').style.display = 'none';
  document.getElementById('move-step2').style.display = 'block';
}

function buildConfirmAddSelect() {
  const sel = document.getElementById('confirm-add-item');
  sel.innerHTML = '<option value="">品目を選択</option>';
  const cats = ['frp', 'sub', 'drain', 'tool', 'consume'];
  cats.forEach(cat => {
    const group = document.createElement('optgroup');
    group.label = CAT_LABELS[cat];
    ITEMS_MASTER.filter(i => i.category === cat).forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.id;
      opt.textContent = item.name;
      group.appendChild(opt);
    });
    sel.appendChild(group);
  });
  sel.onchange = function() {
    const item = ITEMS_MASTER.find(i => i.id === this.value);
    document.getElementById('confirm-add-unit').textContent = item ? item.unit : '―';
  };
}

function renderConfirmList() {
  const el = document.getElementById('confirm-list');
  if (!confirmEntries.length) {
    el.innerHTML = '<div class="empty">品目がありません</div>';
    return;
  }
  el.innerHTML = confirmEntries.map((entry, idx) => {
    const currentQty = getQty(entry.itemId);
    const afterQty = Math.max(0, currentQty - entry.qty);
    return `<div class="card" style="margin-bottom:8px;padding:12px 14px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:#2d2a26">${entry.itemName}</div>
          <div style="font-size:11px;color:#aaa;margin-top:2px">在庫 ${currentQty}${entry.unit} → ${afterQty}${entry.unit}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <button onclick="changeConfirmQty(${idx}, -1)" style="width:32px;height:32px;border-radius:8px;border:1.5px solid #e0d8d0;background:#fff;font-size:18px;cursor:pointer;font-family:inherit">−</button>
          <input type="number" min="0" step="1" value="${entry.qty}"
            id="confirm-qty-${idx}"
            step="${ITEMS_MASTER.find(i=>i.id===entry.itemId)?.step||1}"
            onchange="updateConfirmQty(${idx}, this.value)"
            style="width:56px;padding:6px 4px;border-radius:8px;border:1.5px solid #e0d8d0;font-size:16px;text-align:center;font-family:inherit">
          <button onclick="changeConfirmQty(${idx}, 1)" style="width:32px;height:32px;border-radius:8px;border:1.5px solid #e0d8d0;background:#fff;font-size:18px;cursor:pointer;font-family:inherit">＋</button>
          <span style="font-size:12px;color:#aaa">${entry.unit}</span>
          <button onclick="removeConfirmEntry(${idx})" style="width:32px;height:32px;border-radius:8px;border:none;background:#fce8e8;color:#d32f2f;font-size:16px;cursor:pointer;font-family:inherit">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function changeConfirmQty(idx, delta) {
  const newVal = Math.max(0, (confirmEntries[idx].qty || 0) + delta);
  confirmEntries[idx].qty = newVal;
  renderConfirmList();
}

function updateConfirmQty(idx, val) {
  confirmEntries[idx].qty = Math.max(0, parseFloat(val) || 0);
  renderConfirmList();
}

function removeConfirmEntry(idx) {
  confirmEntries.splice(idx, 1);
  renderConfirmList();
}

function confirmAddItem() {
  const itemId = document.getElementById('confirm-add-item').value;
  const qty = parseFloat(document.getElementById('confirm-add-qty').value);
  if (!itemId) { alert('品目を選択してください'); return; }
  if (!qty || qty <= 0) { alert('数量を入力してください'); return; }
  const item = ITEMS_MASTER.find(i => i.id === itemId);
  if (!item) return;
  // すでにある場合は加算
  const existing = confirmEntries.find(e => e.itemId === itemId);
  if (existing) {
    existing.qty += qty;
  } else {
    confirmEntries.push({ itemId: item.id, itemName: item.name, unit: item.unit, qty });
  }
  document.getElementById('confirm-add-item').value = '';
  document.getElementById('confirm-add-qty').value = '';
  document.getElementById('confirm-add-unit').textContent = '―';
  renderConfirmList();
}

async function submitBulkOut() {
  const staff = document.getElementById('move-staff-top').value;
  const date = document.getElementById('move-date-top').value;
  if (!staff || !date) { alert('スタッフと日付を確認してください'); return; }
  if (!confirmEntries.length) { alert('品目がありません'); return; }

  const promises = [];
  confirmEntries.forEach(entry => {
    const currentQty = getQty(entry.itemId);
    const newQty = Math.max(0, currentQty - entry.qty);
    const movement = { type: 'out', itemId: entry.itemId, itemName: entry.itemName, unit: entry.unit, qty: entry.qty, staff, date, note: '', createdAt: Date.now() };
    inventory[entry.itemId] = newQty;
    promises.push(fetch(DB + '/movements.json', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(movement) }));
    promises.push(fetch(DB + '/inventory/' + entry.itemId + '.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(newQty) }));
  });

  try {
    await Promise.all(promises);
    showToast('📤 ' + confirmEntries.length + '品目を登録しました！');
    confirmEntries = [];
    outQtyMap = {};
    // 全ステップを非表示にしてSTEP1に戻る
    document.getElementById('move-step3').style.display = 'none';
    document.getElementById('move-step2').style.display = 'none';
    document.getElementById('move-step1').style.display = 'block';
    // スタッフ・日付もリセット
    document.getElementById('move-staff-top').value = '';
    document.getElementById('move-date-top').value = getToday();
  } catch(e) { alert('登録に失敗しました。'); }
}

async function submitBulk() {

  if (!staff) { alert('スタッフを選択してください'); return; }

  const entries = [];

    const val = parseFloat(document.getElementById('bulk-qty-' + item.id)?.value);
    if (val && val > 0) entries.push({ item, qty: val });
  });

  if (!entries.length) { alert('数量を1つ以上入力してください'); return; }

  const promises = [];
  entries.forEach(({ item, qty }) => {
    const movement = { type: 'out', itemId: item.id, itemName: item.name, unit: item.unit, qty, staff, date, note: '一括持ち出し', createdAt: Date.now() };
    const newQty = Math.max(0, getQty(item.id) - qty);
    inventory[item.id] = newQty;
    promises.push(fetch(DB + '/movements.json', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(movement) }));

  });

  try {

}

let histTypeFilter = 'all';
let histCatFilter = 'all';
let histStaffFilter = 'all';
let histSearchQuery = '';
let histSeg = 'day';
let histDayMonth = new Date().toISOString().slice(0,7); // 日別で表示中の月
let histYearMonth = new Date().toISOString().slice(0,7); // 月別

let histSelectedDate = '';

function setHistSeg(seg) {
  histSeg = seg;
  ['day','month','range'].forEach(s => {
    document.getElementById('hseg-'+s).classList.remove('active');
    document.getElementById('hist-'+s+'-picker').style.display = 'none';
  });
  document.getElementById('hseg-'+seg).classList.add('active');
  document.getElementById('hist-'+seg+'-picker').style.display = 'block';
  if (seg === 'day') renderHistCalendar();
  else renderHistory();
}

function changeHistMonth(dir) {
  const [y, m] = histDayMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + dir, 1);
  histDayMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  histSelectedDate = '';
  renderHistCalendar();
}

function changeHistYearMonth(dir) {
  const [y, m] = histYearMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + dir, 1);
  histYearMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  renderHistory();
}

function renderHistCalendar() {
  const [cy, cm] = histDayMonth.split('-').map(Number);
  const today = getToday();
  const labelEl = document.getElementById('hist-month-label');
  if (labelEl) labelEl.textContent = `${cy}年${cm}月`;

  // その月の入出庫を集計
  const movByDate = {};
  Object.values(movements).forEach(m => {
    if (!(m.date||'').startsWith(histDayMonth)) return;
    if (!movByDate[m.date]) movByDate[m.date] = {out:0, in:0};
    movByDate[m.date][m.type]++;
  });

  const firstDay = new Date(cy, cm-1, 1).getDay();
  const daysInMonth = new Date(cy, cm, 0).getDate();
  const dows = ['日','月','火','水','木','金','土'];

  const dowStyle = 'text-align:center;font-size:11px;font-weight:600;color:#aaa;padding:4px 0;';
  const dowSunStyle = 'text-align:center;font-size:11px;font-weight:600;color:#e05a5a;padding:4px 0;';
  const dowSatStyle = 'text-align:center;font-size:11px;font-weight:600;color:#4a7ccc;padding:4px 0;';
  let html = dows.map((d,i) => `<div style="${i===0?dowSunStyle:i===6?dowSatStyle:dowStyle}">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${cy}-${String(cm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(cy, cm-1, d).getDay();
    const data = movByDate[dateStr];
    const isToday = dateStr === today;
    const isSelected = dateStr === histSelectedDate;
    const numColor = isSelected ? '#fff' : dow===0 ? '#e05a5a' : dow===6 ? '#4a7ccc' : '#2d2a26';
    const bg = isSelected ? '#e07b4f' : isToday ? '#fff' : data ? '#fdf0e8' : '#fff';
    const border = isToday ? '1.5px solid #e07b4f' : '1.5px solid transparent';
    const dots = data ? `<div style="display:flex;justify-content:center;gap:2px;margin-top:3px">
      ${data.out > 0 ? `<div style="width:5px;height:5px;border-radius:50%;background:${isSelected?'#fff':'#e07b4f'}"></div>` : ''}
      ${data.in > 0 ? `<div style="width:5px;height:5px;border-radius:50%;background:${isSelected?'#fff':'#388e3c'}"></div>` : ''}
    </div>` : '';
    html += `<div style="border-radius:8px;padding:5px 2px;text-align:center;min-height:48px;cursor:pointer;background:${bg};border:${border};"
      onclick="selectHistDate('${dateStr}')">
      <div style="font-size:13px;font-weight:600;color:${numColor}">${d}</div>${dots}
    </div>`;
  }

  const gridEl = document.getElementById('hist-cal-grid');
  if (gridEl) gridEl.innerHTML = html;

  renderHistDayContent();
}

function selectHistDate(dateStr) {
  histSelectedDate = histSelectedDate === dateStr ? '' : dateStr;
  renderHistCalendar();
  renderHistory();
}

function renderHistDayContent() {
  const el = document.getElementById('hist-cal-day-content');
  if (!el) return;
  if (!histSelectedDate) { el.innerHTML = ''; return; }

  const [y, mo, d] = histSelectedDate.split('-');
  const dateLabel = `${parseInt(mo)}月${parseInt(d)}日`;

  let list = Object.entries(movements)
    .filter(([,m]) => m.date === histSelectedDate)
    .sort((a,b) => b[1].createdAt - a[1].createdAt);

  if (histTypeFilter !== 'all') list = list.filter(([,m]) => m.type === histTypeFilter);
  if (histStaffFilter !== 'all') list = list.filter(([,m]) => m.staff === histStaffFilter);
  if (histCatFilter !== 'all') list = list.filter(([,m]) => {
    const item = ITEMS_MASTER.find(i => i.id === m.itemId);
    return item && item.category === histCatFilter;
  });

  if (!list.length) {
    el.innerHTML = `<div style="text-align:center;padding:16px;color:#aaa;font-size:13px">${dateLabel}の記録はありません</div>`;
    return;
  }

  const outCount = list.filter(([,m]) => m.type==='out').length;
  const inCount = list.filter(([,m]) => m.type==='in').length;

  el.innerHTML = `<div style="margin-top:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:14px;font-weight:700;color:#2d2a26">${dateLabel}</div>
      <div style="font-size:11px;color:#aaa">${outCount?'📤'+outCount:''} ${inCount?'📥'+inCount:''}</div>
    </div>
    ${list.map(([key, m]) => `
      <div class="history-item">
        <div class="hist-badge ${m.type}">${m.type==='in'?'入庫':'出庫'}</div>
        <div class="hist-info">
          <div class="hist-name">${m.itemName||'不明'}</div>
          <div class="hist-meta">${m.staff||''}${m.note?' ・ '+m.note:''}</div>
        </div>
        <div class="hist-qty">
          <div class="hist-qty-num ${m.type}">${m.type==='in'?'+':'-'}${m.qty%1===0?m.qty:m.qty.toFixed(1)}</div>
          <div class="hist-qty-unit">${m.unit||''}</div>
        </div>
        <button class="delete-btn" onclick="deleteMovement('${key}', event)">🗑</button>
      </div>`).join('')}
  </div>`;
}

function buildHistCatFilter() {
  const el = document.getElementById('hist-cat-filter-row');
  if (!el) return;
  const cats = ['all', 'frp', 'sub', 'drain', 'tool', 'consume'];
  const labels = { all: 'すべて', frp: 'FRP材', sub: '副資材', drain: 'ドレン', tool: '工具', consume: '消耗品' };
  el.innerHTML = cats.map(c => `<button class="filter-btn ${histCatFilter === c ? 'active' : ''}" onclick="setHistCatFilter('${c}', this)">${labels[c]}</button>`).join('');
}

function renderHistory() {
  buildHistCatFilter();
  const el = document.getElementById('history-list');

  // 月ナビラベル更新
  const [dy, dm] = histDayMonth.split('-');
  const dayLabel = document.getElementById('hist-month-label');
  if (dayLabel) dayLabel.textContent = `${dy}年${parseInt(dm)}月`;
  const [my, mm] = histYearMonth.split('-');
  const monthLabel = document.getElementById('hist-yearmonth-label');
  if (monthLabel) monthLabel.textContent = `${my}年${parseInt(mm)}月`;

  let list = Object.entries(movements).sort((a, b) => b[1].createdAt - a[1].createdAt);

  // セグメントによる日付絞り込み
  if (histSeg === 'day') {
    if (!histSelectedDate) { el.innerHTML = ''; return; }
    list = list.filter(([,m]) => m.date === histSelectedDate);
  } else if (histSeg === 'month') {
    list = list.filter(([,m]) => (m.date || '').startsWith(histYearMonth));
  } else if (histSeg === 'range') {
    const from = document.getElementById('hist-range-from')?.value;
    const to = document.getElementById('hist-range-to')?.value;
    if (from && to) list = list.filter(([,m]) => m.date >= from && m.date <= to);
  }

  // 共通フィルター
  if (histTypeFilter !== 'all') list = list.filter(([,m]) => m.type === histTypeFilter);
  if (histStaffFilter !== 'all') list = list.filter(([,m]) => m.staff === histStaffFilter);
  if (histCatFilter !== 'all') {
    list = list.filter(([,m]) => {
      const item = ITEMS_MASTER.find(i => i.id === m.itemId);
      return item && item.category === histCatFilter;
    });
  }
  if (histSearchQuery) {
    const q = histSearchQuery.toLowerCase();
    list = list.filter(([,m]) =>
      (m.itemName || '').toLowerCase().includes(q) ||
      (m.note || '').toLowerCase().includes(q) ||
      (m.staff || '').toLowerCase().includes(q)
    );
  }

  if (!list.length) { el.innerHTML = '<div class="empty">📭 該当する履歴がありません</div>'; return; }

  // 月別はさらに日付グループ化
  const byDate = {};
  list.slice(0, 300).forEach(([key, m]) => {
    const d = m.date || '日付不明';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push([key, m]);
  });

  const dateKeys = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
  const today = getToday();

  const listHtml = dateKeys.map(dateKey => {
    const [y, mo, d] = dateKey.split('-');
    const dateLabel = dateKey === '日付不明' ? '日付不明' :
      (dateKey === today ? '今日　' : '') + `${parseInt(mo)}月${parseInt(d)}日`;
    const dayList = byDate[dateKey];
    const dayOutTotal = dayList.filter(([,m]) => m.type === 'out').length;
    const dayInTotal = dayList.filter(([,m]) => m.type === 'in').length;

    const itemsHtml = dayList.map(([key, m]) =>
      `<div class="history-item">
        <div class="hist-badge ${m.type}">${m.type === 'in' ? '入庫' : '出庫'}</div>
        <div class="hist-info">
          <div class="hist-name">${m.itemName || '不明'}</div>
          <div class="hist-meta">${m.staff || ''}${m.note ? ' ・ ' + m.note : ''}</div>
        </div>
        <div class="hist-qty">
          <div class="hist-qty-num ${m.type}">${m.type === 'in' ? '+' : '-'}${m.qty % 1 === 0 ? m.qty : m.qty.toFixed(1)}</div>
          <div class="hist-qty-unit">${m.unit || ''}</div>
        </div>
        <button class="delete-btn" onclick="deleteMovement('${key}', event)">🗑</button>
      </div>`).join('');

    return `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 2px;margin-bottom:6px">
        <div style="font-size:13px;font-weight:700;color:#2d2a26">${dateLabel}</div>
        <div style="font-size:11px;color:#aaa">${dayOutTotal ? '📤'+dayOutTotal : ''} ${dayInTotal ? '📥'+dayInTotal : ''}</div>
      </div>
      ${itemsHtml}
    </div>`;
  }).join('');

  el.innerHTML = listHtml;
}

async function deleteMovement(key, e) {
  e.stopPropagation();
  const m = movements[key];
  if (!m) return;
  if (!confirm(`「${m.itemName}」の${m.type === 'in' ? '入庫' : '持ち出し'}記録を削除しますか？\n在庫数も元に戻ります。`)) return;
  try {
    // 在庫を逆算して戻す
    const currentQty = getQty(m.itemId);
    const restoredQty = m.type === 'in' ? currentQty - m.qty : currentQty + m.qty;
    await Promise.all([
      fetch(DB + '/movements/' + key + '.json', { method: 'DELETE' }),
      fetch(DB + '/inventory/' + m.itemId + '.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(Math.max(0, restoredQty)) })
    ]);
    inventory[m.itemId] = Math.max(0, restoredQty);
    delete movements[key];
    showToast('削除しました');
    renderHistory();
  } catch(e) { alert('削除に失敗しました。'); }
}

function renderTableStats() {
  const el = document.getElementById('stats-content');
  const list = Object.entries(movements).sort((a,b) => b[1].createdAt - a[1].createdAt);
  const allMonths = [...new Set(list.map(([,m]) => (m.date||'').slice(0,7)).filter(Boolean))].sort().reverse();
  if (!allMonths.length) { el.innerHTML = '<div class="empty">データがありません</div>'; return; }
  if (!allMonths.includes(statsMonth)) statsMonth = allMonths[0];
  const idx = allMonths.indexOf(statsMonth);
  const [y, mo] = statsMonth.split('-');
  const moveType = statsSeg === 'in' ? 'in' : 'out';
  const typeLabel = moveType === 'out' ? '持ち出し' : '入庫';

  // 持ち出し：スタッフ4名（外注は持ち出しがある場合のみ追加）、入庫：外注のみ
  const BASE_STAFF = ['加藤瑞樹','山内浩一','森田義則','富山裕貴'];
  const BASE_STAFF_SHORT = ['加藤','山内','森田','富山'];

  // 外注の持ち出しがあるか確認（期間フィルター適用後）
  const rangeFrom = document.getElementById('stats-range-from')?.value || '';
  const rangeTo = document.getElementById('stats-range-to')?.value || '';
  const inDateFilter2 = (m) => {
    if (statsPeriod === 'range') return rangeFrom && rangeTo && m.date >= rangeFrom && m.date <= rangeTo;
    return (m.date||'').startsWith(statsMonth);
  };
  const hasGaichuOut = moveType === 'out' && list.some(([,m]) => m.type === 'out' && m.staff === '外注' && inDateFilter2(m));

  const STAFF = moveType === 'out'
    ? (hasGaichuOut ? [...BASE_STAFF, '外注'] : BASE_STAFF)
    : ['外注'];
  const STAFF_SHORT = moveType === 'out'
    ? (hasGaichuOut ? [...BASE_STAFF_SHORT, '外注'] : BASE_STAFF_SHORT)
    : ['外注'];

  const inDateFilter = (m) => {
    if (statsPeriod === 'range') return rangeFrom && rangeTo && m.date >= rangeFrom && m.date <= rangeTo;
    return (m.date||'').startsWith(statsMonth);
  };

  // 持ち出しリスト
  const outList = list.filter(([,m]) => m.type === 'out' && STAFF.includes(m.staff) && inDateFilter2(m));
  // 外注以外の入庫リスト（持ち出しから相殺用）
  const inListNonGaicyu = list.filter(([,m]) => m.type === 'in' && m.staff !== '外注' && inDateFilter2(m));
  // 入庫表用：外注の入庫のみ
  const inListGaicyu = list.filter(([,m]) => m.type === 'in' && m.staff === '外注' && inDateFilter2(m));

  const monthList = moveType === 'out' ? outList : inListGaicyu;

  // 品目×スタッフ集計
  const byItemStaff = {};
  ITEMS_MASTER.forEach(item => {
    byItemStaff[item.id] = {name:item.name, unit:item.unit, staff:{}, total:0};
    STAFF.forEach(s => byItemStaff[item.id].staff[s]=0);
  });

  if (moveType === 'out') {
    // 持ち出しを加算
    outList.forEach(([,m]) => {
      if (!byItemStaff[m.itemId] || !STAFF.includes(m.staff)) return;
      byItemStaff[m.itemId].staff[m.staff] += m.qty;
      byItemStaff[m.itemId].total += m.qty;
    });
    // 外注以外の入庫を相殺（持ち出しから引く）
    inListNonGaicyu.forEach(([,m]) => {
      if (!byItemStaff[m.itemId] || !STAFF.includes(m.staff)) return;
      byItemStaff[m.itemId].staff[m.staff] -= m.qty;
      byItemStaff[m.itemId].total -= m.qty;
    });
  } else {
    inListGaicyu.forEach(([,m]) => {
      if (!byItemStaff[m.itemId]) return;
      byItemStaff[m.itemId].staff['外注'] += m.qty;
      byItemStaff[m.itemId].total += m.qty;
    });
  }

  // データある品目のみ＋検索フィルター
  const statsQuery = (document.getElementById('stats-search-input')?.value || '').trim().toLowerCase();
  const activeItems = ITEMS_MASTER.filter(item => {
    if (!byItemStaff[item.id] || byItemStaff[item.id].total === 0) return false;
    if (statsQuery && !item.name.toLowerCase().includes(statsQuery)) return false;
    return true;
  });

  // テーブルCSS
  const thStyle = 'padding:8px 6px;font-size:12px;font-weight:700;color:#2d2a26;background:#f5f0ea;text-align:center;border-bottom:2px solid #e0d8d0;white-space:nowrap;';
  const tdStyle = 'padding:8px 6px;font-size:13px;text-align:center;border-bottom:1px solid #f0ede8;color:#2d2a26;';
  const tdNameStyle = 'padding:8px 8px;font-size:13px;text-align:left;border-bottom:1px solid #f0ede8;color:#2d2a26;white-space:nowrap;';
  const tdTotalStyle = 'padding:8px 6px;font-size:13px;font-weight:700;text-align:center;border-bottom:1px solid #f0ede8;color:#e07b4f;';

  const tableHtml = `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <table style="width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04)">
      <thead>
        <tr>
          <th style="${thStyle}text-align:left">品目</th>
          ${STAFF_SHORT.map(s => `<th style="${thStyle}">${s}</th>`).join('')}
          <th style="${thStyle}color:#e07b4f">計</th>
        </tr>
      </thead>
      <tbody>
        ${activeItems.length ? activeItems.map(item => {
          const d = byItemStaff[item.id];
          return `<tr>
            <td style="${tdNameStyle}">${item.name}</td>
            ${STAFF.map(s => {
              const v = d.staff[s];
              const color = v < 0 ? 'color:#388e3c;' : '';
              return `<td style="${tdStyle}${color}">${v !== 0 ? (v%1===0?v:v.toFixed(1)) : ''}</td>`;
            }).join('')}
            <td style="${tdTotalStyle}${d.total < 0 ? 'color:#388e3c;' : ''}">${d.total%1===0?d.total:d.total.toFixed(1)}</td>
          </tr>`;
        }).join('') : `<tr><td colspan="6" style="padding:24px;text-align:center;color:#aaa;font-size:14px">この月の持ち出しデータはありません</td></tr>`}
      </tbody>
    </table>
  </div>`;

  // 月ナビを更新
  const navEl = document.getElementById('stats-month-nav');
  if (navEl) navEl.innerHTML = `
    <button class="month-nav-btn" onclick="changeStatsMonth('${allMonths[idx+1]||''}')" ${!allMonths[idx+1]?'disabled style="opacity:0.3"':''}>◀</button>
    <span class="month-nav-label">${y}年${parseInt(mo)}月</span>
    <button class="month-nav-btn" onclick="changeStatsMonth('${allMonths[idx-1]||''}')" ${!allMonths[idx-1]?'disabled style="opacity:0.3"':''}>▶</button>`;

  // 期間ラベル
  const periodLabel = statsPeriod === 'range' && rangeFrom && rangeTo
    ? rangeFrom + ' 〜 ' + rangeTo
    : `${y}年${parseInt(mo)}月`;

  el.innerHTML = `
    ${tableHtml}
    <div style="margin-top:12px">
      <button class="btn-primary" onclick="exportTableExcel('${statsMonth}','${moveType}')">📥 Excelで出力</button>
    </div>`;
}

async function exportTableExcel(month, moveType = 'out') {
  if (typeof XLSX === 'undefined') { alert('Excel出力ライブラリが読み込まれていません'); return; }
  const [y, mo] = month.split('-');
  const label = y + '年' + parseInt(mo) + '月';
  const typeLabel = moveType === 'out' ? '持ち出し' : '入庫';
  const STAFF = ['加藤瑞樹','山内浩一','森田義則','富山裕貴'];
  const staffList = moveType === 'out' ? ['加藤瑞樹','山内浩一','森田義則','富山裕貴'] : ['外注'];
  const list = Object.values(movements).filter(m => {
    if (!(m.date||'').startsWith(month)) return false;
    if (m.type !== moveType) return false;
    if (moveType === 'in' && m.staff !== '外注') return false;
    return true;
  });
  const byItemStaff = {};
  ITEMS_MASTER.forEach(item => { byItemStaff[item.id] = {name:item.name, unit:item.unit, staff:{}, total:0}; staffList.forEach(s => byItemStaff[item.id].staff[s]=0); });
  list.forEach(m => {
    if (!byItemStaff[m.itemId]) return;
    if (staffList.includes(m.staff)) { byItemStaff[m.itemId].staff[m.staff] += m.qty; byItemStaff[m.itemId].total += m.qty; }
  });
  const activeItems = ITEMS_MASTER.filter(item => byItemStaff[item.id]?.total > 0);
  const data = [['品目','加藤瑞樹','山内浩一','森田義則','富山裕貴','計']];
  activeItems.forEach(item => {
    const d = byItemStaff[item.id];
    data.push([item.name, d.staff['加藤瑞樹']||'', d.staff['山内浩一']||'', d.staff['森田義則']||'', d.staff['富山裕貴']||'', d.total||'']);
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), label+typeLabel+'表');
  XLSX.writeFile(wb, typeLabel+'表_'+label+'.xlsx');
}

// ── 管理 ──
function showAdmin() {
  const el = document.getElementById('admin-content');
  if (!adminLoggedIn) {
    el.innerHTML = `<div class="admin-lock">
      <div class="lock-icon">🔐</div>
      <div class="lock-title">管理者ページ</div>
      <div class="lock-sub">パスワードを入力してください</div>
      <div style="width:100%;max-width:300px">
        <input type="password" id="admin-pass" placeholder="パスワード" style="margin-bottom:12px" onkeydown="if(event.key==='Enter')checkAdminPass()">
        <button class="btn-primary" onclick="checkAdminPass()">ログイン</button>
      </div>
    </div>`;
    return;
  }
  renderAdminContent();
}

function checkAdminPass() {
  if (document.getElementById('admin-pass').value === ADMIN_PASS) {
    adminLoggedIn = true; renderAdminContent();
  } else { alert('パスワードが違います'); }
}

let adminCatFilter = 'all';
let adminQtyMap = {};   // 入力中の在庫値を保持
let adminAlertMap = {}; // 入力中のアラート値を保持

function renderAdminContent() {
  const el = document.getElementById('admin-content');
  const cats = ['all', 'frp', 'sub', 'drain', 'tool', 'consume'];
  const catLabels = { all: 'すべて', frp: 'FRP材', sub: '副資材', drain: 'ドレン', tool: '工具', consume: '消耗品' };

  const filteredItems = ITEMS_MASTER.filter(item => {
    if (adminCatFilter !== 'all' && item.category !== adminCatFilter) return false;
    return true;
  });

  const itemsHtml = filteredItems.map(item => {
    const qty = adminQtyMap[item.id] !== undefined ? adminQtyMap[item.id] : getQty(item.id);
    const alertVal = adminAlertMap[item.id] !== undefined ? adminAlertMap[item.id] : getAlertVal(item.id);
    const catColor = CAT_COLORS[item.category] || 'cat-other';
    const catLabel = CAT_LABELS[item.category] || item.category;
    return '<div class="item-edit-row">' +
      '<div class="item-edit-name">' + item.name + ' <span class="cat-badge ' + catColor + '">' + catLabel + '</span></div>' +
      '<div class="item-edit-fields">' +
      '<input type="number" min="0" step="0.1" value="' + qty + '" id="admin-qty-' + item.id + '" placeholder="0" style="flex:2">' +
      '<span>' + item.unit + '</span>' +
      '<span style="font-size:11px;color:#e07b4f;white-space:nowrap">⚠️</span>' +
      '<input type="number" min="0" step="1" value="' + alertVal + '" id="admin-alert-' + item.id + '" placeholder="0" style="flex:1;max-width:52px">' +
      '</div></div>';
  }).join('');

  const filterHtml = cats.map(c =>
    '<button class="filter-btn ' + (adminCatFilter === c ? 'active' : '') + '" onclick="setAdminCatFilter(\'' + c + '\')">' + catLabels[c] + '</button>'
  ).join('');

  el.innerHTML = '<div class="wrap">' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">' +
    '<div class="page-title">⚙️ 在庫管理</div>' +
    '<button class="logout-btn" onclick="adminLogout()">ログアウト</button></div>' +
    '<div class="page-sub">現在庫を直接設定・初期設定</div>' +
    '<div id="admin-cat-filter" style="position:sticky;top:56px;z-index:50;background:#f5f0ea;padding:6px 0 4px;margin:0 -16px;padding-left:16px;overflow-x:auto;display:flex;gap:6px;-webkit-overflow-scrolling:touch;margin-bottom:4px">' + filterHtml + '</div>' +
    '<div class="section-title">在庫数を設定（' + filteredItems.length + '品目）</div>' +
    (filteredItems.length ? itemsHtml : '<div class="empty">該当する品目がありません</div>') +
    
    '<div style="margin-top:8px"><button class="btn-primary" onclick="saveCatQty()">💾 保存する</button></div>' +
    '<div style="margin-top:6px"><button class="btn-secondary" onclick="saveAllQty()" style="width:100%;padding:10px;background:#fff;color:#888;border:1.5px solid #e0d8d0;border-radius:12px;font-size:13px;cursor:pointer;font-family:inherit;">全カテゴリ一括保存</button></div>' +
    '<div style="margin-top:8px"><button class="btn-secondary" onclick="exportInventoryExcel()" style="width:100%;padding:12px;background:#1d7044;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">📥 在庫データをExcelで出力（バックアップ）</button></div>' +
    '<div style="margin-top:8px"><button class="btn-secondary" onclick="triggerImport()" style="width:100%;padding:12px;background:#fff;color:#2858b0;border:1.5px solid #2858b0;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">📤 Excelから在庫を復元</button></div>' +
    '</div>';
}

function setAdminCatFilter(cat) {
  // 切り替え前に現在の入力値を保存
  saveAdminInputs();
  adminCatFilter = cat;
  renderAdminContent();
}

function saveAdminInputs() {
  ITEMS_MASTER.forEach(item => {
    const qtyEl = document.getElementById('admin-qty-' + item.id);
    const alertEl = document.getElementById('admin-alert-' + item.id);
    if (qtyEl) adminQtyMap[item.id] = qtyEl.value;
    if (alertEl) adminAlertMap[item.id] = alertEl.value;
  });
}





async function saveItemQty(itemId) {
  const qty = parseFloat(document.getElementById('admin-qty-' + itemId)?.value) || 0;
  try {
    await fetch(DB + '/inventory/' + itemId + '.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(qty) });
    inventory[itemId] = qty;
    showToast('保存しました');
  } catch(e) { alert('保存に失敗しました。'); }
}

async function saveCatQty() {
  // 現在表示中の品目のみ保存
  const invUpdates = {};
  const alertUpdates = {};
  const visibleItems = ITEMS_MASTER.filter(item =>
    adminCatFilter === 'all' || item.category === adminCatFilter
  );
  visibleItems.forEach(item => {
    const qtyEl = document.getElementById('admin-qty-' + item.id);
    const alertEl = document.getElementById('admin-alert-' + item.id);
    const qty = parseFloat(qtyEl?.value) || 0;
    const alert = parseFloat(alertEl?.value);
    invUpdates[item.id] = qty;
    inventory[item.id] = qty;
    if (!isNaN(alert)) {
      alertUpdates[item.id] = alert;
      alertSettings[item.id] = alert;
    }
  });
  try {
    const promises = Object.entries(invUpdates).map(([id, qty]) =>
      fetch(DB + '/inventory/' + id + '.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(qty) })
    );
    Object.entries(alertUpdates).forEach(([id, val]) =>
      promises.push(fetch(DB + '/alertSettings/' + id + '.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(val) }))
    );
    await Promise.all(promises);
    const catLabel = adminCatFilter === 'all' ? '全品目' : CAT_LABELS[adminCatFilter] || adminCatFilter;
    showToast('✅ ' + catLabel + 'を保存しました！');
  } catch(e) { alert('保存に失敗しました。'); }
}

async function saveAllQty() {
  // 保存前に現在の入力値をマップに保存
  saveAdminInputs();
  const invUpdates = {};
  const alertUpdates = {};
  ITEMS_MASTER.forEach(item => {
    // マップの値を優先、なければ現在の在庫値
    const qty = adminQtyMap[item.id] !== undefined
      ? (parseFloat(adminQtyMap[item.id]) || 0)
      : getQty(item.id);
    const alert = adminAlertMap[item.id] !== undefined
      ? parseFloat(adminAlertMap[item.id])
      : getAlertVal(item.id);
    invUpdates[item.id] = qty;
    inventory[item.id] = qty;
    alertUpdates[item.id] = !isNaN(alert) ? alert : getAlertVal(item.id);
    alertSettings[item.id] = alertUpdates[item.id];
  });
  try {
    await Promise.all([
      fetch(DB + '/inventory.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(invUpdates) }),
      fetch(DB + '/alertSettings.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(alertUpdates) })
    ]);
    showToast('✅ 保存しました！');
  } catch(e) { alert('保存に失敗しました。'); }
}

function adminLogout() {
  adminLoggedIn = false;
  adminQtyMap = {};
  adminAlertMap = {};
  showAdmin();
}

// ファイル入力（body直下に配置）
function triggerImport() {
  let el = document.getElementById('inventory-import-file');
  if (!el) {
    el = document.createElement('input');
    el.type = 'file';
    el.id = 'inventory-import-file';
    el.accept = '.xlsx';
    el.style.display = 'none';
    el.onchange = function() { importInventoryExcel(this); };
    document.body.appendChild(el);
  }
  el.click();
}

// 在庫バックアップ（Excel出力）
function exportInventoryExcel() {
  if (typeof XLSX === 'undefined') { alert('Excel出力ライブラリが読み込まれていません'); return; }
  const now = new Date();
  const dateStr = now.toLocaleDateString('sv');
  const data = [['品目ID', '品目名', 'カテゴリ', '単位', '現在庫']];
  ITEMS_MASTER.forEach(item => {
    data.push([item.id, item.name, CAT_LABELS[item.category] || item.category, item.unit, getQty(item.id)]);
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:15},{wch:20},{wch:10},{wch:8},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, '在庫データ');
  XLSX.writeFile(wb, '在庫バックアップ_' + dateStr + '.xlsx');
  showToast('📥 バックアップを出力しました！');
}

// 在庫復元（Excelから読み込み）
async function importInventoryExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {header:1});
      if (data.length < 2) { alert('データが見つかりません'); return; }
      const updates = {};
      let count = 0;
      data.slice(1).forEach(row => {
        const id = row[0];
        const qty = parseFloat(row[4]);
        if (id && !isNaN(qty)) {
          updates[id] = qty;
          inventory[id] = qty;
          count++;
        }
      });
      if (!confirm(count + '品目の在庫を復元します。よろしいですか？')) return;
      await fetch(DB + '/inventory.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(updates) });
      showToast('✅ ' + count + '品目の在庫を復元しました！');
      renderAdminContent();
    } catch(e) { alert('読み込みに失敗しました。正しいバックアップファイルか確認してください。'); }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}
